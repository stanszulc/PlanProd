        const DEMO_ZP = `zp_id,product,volume,due_date,priority
ZP-001,P-KOD-100-100,30,2026-05-25,1

ZP-004,P-TLU-KUL-01,25,2026-05-25,2
ZP-005,P-KOD-100-100,20,2026-05-26,1
ZP-006,P-KRA-MAS-03,150,2026-05-26,4
ZP-007,P-SKR-ROZ-02,60,2026-05-26,3
ZP-008,P-TLU-KUL-01,30,2026-05-26,2
ZP-009,P-KOD-100-100,40,2026-05-27,1
ZP-010,P-KRA-MAS-03,80,2026-05-27,4
ZP-011,P-SKR-ROZ-02,40,2026-05-27,3
ZP-012,P-TLU-KUL-01,20,2026-05-27,2`;

        const DEMO_ZS = `zs_id,pozycja,klient,product,volume,due_date,priority
ZS-001,1,Klima-Tech Sp. z o.o.,P-KOD-100-100,30,2026-05-25,1
ZS-002,1,VentPro S.A.,P-TLU-KUL-01,25,2026-05-25,2
ZS-003,1,AirSystem Kraków,P-SKR-ROZ-02,50,2026-05-25,3
ZS-004,1,HVAC Południe,P-KRA-MAS-03,100,2026-05-25,4
ZS-001,2,Klima-Tech Sp. z o.o.,P-KOD-100-100,20,2026-05-26,1
ZS-002,2,VentPro S.A.,P-TLU-KUL-01,30,2026-05-26,2
ZS-003,2,AirSystem Kraków,P-SKR-ROZ-02,60,2026-05-26,3
ZS-004,2,HVAC Południe,P-KRA-MAS-03,150,2026-05-26,4
ZS-001,3,Klima-Tech Sp. z o.o.,P-KOD-100-100,40,2026-05-27,1
ZS-002,3,VentPro S.A.,P-TLU-KUL-01,20,2026-05-27,2
ZS-003,3,AirSystem Kraków,P-SKR-ROZ-02,40,2026-05-27,3
ZS-004,3,HVAC Południe,P-KRA-MAS-03,80,2026-05-27,4`;

        // Konwersja Date → 'YYYY-MM-DD' w lokalnej strefie czasowej (nie UTC)
        function localDateStr(dt) {
          const d = new Date(dt);
          return d.getFullYear() + '-' +
            String(d.getMonth()+1).padStart(2,'0') + '-' +
            String(d.getDate()).padStart(2,'0');
        }

        // Bezpieczny podział linii CSV
        function safeSplitCSV(line, sep) {
          const result = [];
          let current = "";
          let inQuotes = false;
          
          for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') {
              inQuotes = !inQuotes;
            } else if (char === sep && !inQuotes) {
              result.push(current.trim());
              current = "";
            } else {
              current += char;
            }
          }
          result.push(current.trim());
          return result.map(v => v.replace(/^"|"$/g, ''));
        }

        function parseRouting(text) {
          const cleanText = text.replace(/^﻿/, ""); 
          const lines = cleanText.trim().split("\n").map(l => l.trim()).filter(Boolean);
          if (lines.length < 2) return [];
          const sep = lines[0].includes(";") ? ";" : ",";
          const headers = safeSplitCSV(lines[0], sep).map(h => h.toLowerCase());
          
          return lines.slice(1).map(line => {
            const vals = safeSplitCSV(line, sep);
            const r = {}; headers.forEach((h, i) => r[h] = vals[i] || "");
            
            const ct = Math.max(0, parseFloat(r.ct_min || r.ct || 0));
            const cap = parseFloat(r.capacity_h || r.cap || r.capacity || 8);

            return {
              product: r.product || "",
              operation: r.operation || "",
              workcenter: (r.workcenter || r.wc || "").toUpperCase(),
              ct_min: ct,
              sequence:     parseInt(r.sequence || r.seq || 1),
              predecessors: (r.predecessors || r.pred || '').split(/[,|]/)
                              .map(s => parseInt(s.trim())).filter(n => !isNaN(n)),
              capacity_h: cap <= 0 ? 8 : cap,
            };
          }).filter(r => r.product && r.workcenter && r.ct_min > 0);
        }

        function parseZP(text) {
          const cleanText = text.replace(/^﻿/, ""); 
          const lines = cleanText.trim().split("\n").map(l => l.trim()).filter(Boolean);
          if (lines.length < 2) return [];
          const sep = lines[0].includes(";") ? ";" : ",";
          const headers = safeSplitCSV(lines[0], sep).map(h => h.toLowerCase());
          
          return lines.slice(1).map(line => {
            const vals = safeSplitCSV(line, sep);
            const r = {}; headers.forEach((h, i) => r[h] = vals[i] || "");
            return {
              zp_id: r.zp_id || r.zp || r.id || "",
              product: r.product || "",
              volume: Math.max(0, parseFloat(r.volume || r.vol || r.qty || 0)),
              due_date: r.due_date || r.due || r.data || "",
              priority: parseInt(r.priority || r.prio || 1),
            };
          }).filter(r => r.product && r.volume > 0 && r.due_date);
        }


        function parseZS(text) {
          const cleanText = text.replace(/^\uFEFF/, "");
          const lines = cleanText.trim().split("\n").map(l => l.trim()).filter(Boolean);
          if (lines.length < 2) return [];
          const sep = lines[0].includes(";") ? ";" : ",";
          const headers = safeSplitCSV(lines[0], sep).map(h => h.toLowerCase());
          return lines.slice(1).map(line => {
            const vals = safeSplitCSV(line, sep);
            const r = {}; headers.forEach((h, i) => r[h] = vals[i] || "");
            return {
              zs_id:    r.zs_id || r.zs || "",
              pozycja:  parseInt(r.pozycja || r.poz || 1),
              klient:   r.klient || r.client || r.customer || "",
              product:  r.product || "",
              volume:   Math.max(0, parseFloat(r.volume || r.vol || 0)),
              due_date: r.due_date || r.due || "",
              priority: parseInt(r.priority || r.prio || 1),
            };
          }).filter(r => r.product && r.volume > 0 && r.due_date);
        }

        // Konwertuj ZS → ZP (1 pozycja ZS = 1 ZP wiodące)
        function zsToZP(zsList) {
          // Format zp_id: ZP-001/01/01 = nr_ZS / pozycja / nr_ZP_w_pozycji
          return zsList.map(zs => {
            const zsNum  = zs.zs_id.replace(/[^0-9]/g,'').padStart(3,'0') || '001';
            const pozNum = String(zs.pozycja || 1).padStart(2,'0');
            return {
              zp_id:    'ZP-' + zsNum + '/' + pozNum,
              zs_id:    zs.zs_id,
              pozycja:  zs.pozycja,
              klient:   zs.klient,
              product:  zs.product,
              volume:   zs.volume,
              due_date: zs.due_date,
              priority: zs.priority,
            };
          });
        }

        // Back-scheduling engine
        // Wejście: ZP lista + routingByProduct + grafik (schedule per wc per dayName)
        // Wyjście: lista pod-ZP z {zp_id, sub_id, workcenter, operation, start_dt, end_dt, durH}

        // Back-scheduling engine
        // wcSchedule: { "G-01": [pon,wt,sr,czw,pt,sob,nd] } — tablica 7 elementów, index 0=pon
        // JS getDay(): 0=nd, 1=pon ... 6=sob → mapujemy na index w tablicy

        // ─── SCHEDULER ENGINE ─────────────────────────────────────────────────────────
        // wcSchedule: { "G-01": [pon,wt,sr,czw,pt,sob,nd] } — idx 0=pon
        // JS getDay(): 0=nd,1=pon...6=sob

        function jsDay2idx(jsDay) {
          return jsDay === 0 ? 6 : jsDay - 1;
        }

        function getAvail(wc, dt, wcSchedule) {
          const sched = wcSchedule && wcSchedule[wc];
          if (!sched) return 16;
          const d = new Date(dt);
          // Nowy format: obiekt z datami { "2026-05-25": 16 }
          if (!Array.isArray(sched) && typeof sched === 'object') {
            const dateKey = localDateStr(d);
            if (sched[dateKey] !== undefined) return sched[dateKey];
            // Fallback: domyślnie pon-pt=16, sob-nd=0
            const jsDay = d.getDay();
            return (jsDay===0||jsDay===6) ? 0 : 16;
          }
          // Stary format: tablica [pon..nd]
          return sched[jsDay2idx(d.getDay())] !== undefined ? sched[jsDay2idx(d.getDay())] : 0;
        }

        // Podziel operację na segmenty (bloki) z cięciem na granicach dni roboczych
        // Zwraca: { startDt, segments: [{segStart, segEnd, durH}] }
        function backScheduleOp(endDt, hoursNeeded, wc, wcSchedule) {
          const segments = [];
          let cursor    = new Date(endDt);
          let remaining = hoursNeeded;
          let safety    = 0;

          while (remaining > 0.0001 && safety++ < 5000) {
            const avail  = getAvail(wc, cursor, wcSchedule);

            if (avail === 0) {
              cursor.setDate(cursor.getDate() - 1);
              cursor.setHours(23, 59, 0, 0);
              continue;
            }

            const dayEnd     = avail;
            const curH       = cursor.getHours() + cursor.getMinutes() / 60;
            const availToday = Math.min(curH, dayEnd);

            if (availToday <= 0.0001) {
              cursor.setDate(cursor.getDate() - 1);
              const prevAvail = getAvail(wc, cursor, wcSchedule);
              cursor.setHours(prevAvail > 0 ? prevAvail : 23, prevAvail > 0 ? 0 : 59, 0, 0);
              continue;
            }

            const take   = Math.min(remaining, availToday);
            remaining   -= take;
            const startH = curH - take;

            // Zachowaj koniec segmentu PRZED jakąkolwiek modyfikacją kursora
            const segEndDt   = new Date(cursor);
            // Teraz oblicz start
            const segStartDt = new Date(cursor);
            segStartDt.setHours(Math.floor(startH), Math.round((startH % 1) * 60), 0, 0);

            segments.unshift({ segStart: segStartDt, segEnd: segEndDt, durH: take });

            if (remaining > 0.0001) {
              cursor = new Date(segStartDt);
              cursor.setDate(cursor.getDate() - 1);
              const prevAvail = getAvail(wc, cursor, wcSchedule);
              cursor.setHours(prevAvail > 0 ? prevAvail : 23, prevAvail > 0 ? 0 : 59, 0, 0);
            } else {
              cursor = new Date(segStartDt);
            }
          }

          return { startDt: cursor, segments };
        }

        // Back-schedule wszystkich ZP z listy
        // Zwraca listę pod-ZP, każde z tablicą segmentów (bloki na Ganttcie)
        function backSchedule(zpList, routingByProduct, wcSchedule) {
          const result = [];
          const zpOpCounter = {}; // per zp_id → licznik operacji

          zpList.forEach(zp => {
            const ops = (routingByProduct[zp.product] || [])
              .slice()
              .sort((a, b) => b.sequence - a.sequence); // od ostatniej do pierwszej
            if (!ops.length) return;

            // Kursor = koniec dnia due_date
            let cursor = new Date(zp.due_date + 'T00:00:00');
            const lastAvail = getAvail(ops[0].workcenter, cursor, wcSchedule) || 16;
            cursor.setHours(lastAvail, 0, 0, 0);

            const doneStarts = {}; // sequence → startDt (dla predecessors w back)

            ops.forEach(op => {
              const durH   = zp.volume * op.ct_min / 60;
              // W back-schedule: endDt = min(startów successors) jeśli ma predecessors
              let endDt = new Date(cursor);
              if (op.predecessors && op.predecessors.length > 0) {
                // Znajdź successors — operacje które mają ten sequence w predecessors
                const successorStarts = ops
                  .filter(o => o.predecessors && o.predecessors.includes(op.sequence))
                  .map(o => doneStarts[o.sequence])
                  .filter(Boolean);
                if (successorStarts.length > 0)
                  endDt = new Date(Math.min(...successorStarts.map(d => new Date(d).getTime())));
              }
              const { startDt, segments } = backScheduleOp(endDt, durH, op.workcenter, wcSchedule);
              doneStarts[op.sequence] = startDt;

              result.push({
                zp_id:      (() => { if (!zpOpCounter[zp.zp_id]) zpOpCounter[zp.zp_id]=0; zpOpCounter[zp.zp_id]++; return zp.zp_id+'/'+String(zpOpCounter[zp.zp_id]).padStart(3,'0'); })(),
                 parent_zp:  zp.zp_id,
                zs_id:      zp.zs_id || '',
                klient:     zp.klient || '',
                sub_id:     result.length > 0 ? result[result.length] : zp.zp_id,
                product:    zp.product,
                workcenter: op.workcenter,
                operation:  op.operation,
                sequence:   op.sequence,
                volume:     zp.volume,
                durH,
                start_dt:   startDt,
                end_dt:     endDt,
                segments,           // bloki cięte na granicach dni
                due_date:   zp.due_date,
                priority:   zp.priority,
              });

              cursor = new Date(startDt);
            });
          });

          return result.sort((a, b) => a.start_dt - b.start_dt);
        }


        // ─── FORWARD SCHEDULER Z KOLEJKĄ ──────────────────────────────────────────
        // Wejście: zpList (posortowane wg priorytetu), routingByProduct, wcSchedule, planStart (Date)
        // Wyjście: tablica { zp_id, product, due_date, start_dt, end_dt, delay_h, bufferConsumed, segments[] }
        //          + backStart (z back-schedule) per ZP dla TOC

        function forwardScheduleOp(fromDt, hoursNeeded, wc, wcSchedule, occupancy) {
          let cursor    = new Date(fromDt);
          let remaining = hoursNeeded;
          const segs    = [];
          let safety    = 0;

          while (remaining > 0.0001 && safety++ < 10000) {
            // Pomiń weekendy/dni wolne
            const avail = getAvail(wc, cursor, wcSchedule);
            if (avail === 0) {
              cursor = new Date(cursor); cursor.setDate(cursor.getDate()+1); cursor.setHours(0,0,0,0);
              continue;
            }

            // Okno dnia roboczego: cursor.day 00:00 → avail:00
            const dayEnd = new Date(cursor); dayEnd.setHours(avail, 0, 0, 0);

            // Jeśli cursor poza oknem — następny dzień
            if (cursor >= dayEnd) {
              cursor = new Date(cursor); cursor.setDate(cursor.getDate()+1); cursor.setHours(0,0,0,0);
              continue;
            }

            // Przesuń cursor za zajęte sloty
            let slotStart = new Date(cursor);
            let shifted = true;
            while (shifted) {
              shifted = false;
              for (const o of (occupancy[wc] || [])) {
                if (new Date(o.from) <= slotStart && new Date(o.to) > slotStart) {
                  slotStart = new Date(o.to);
                  shifted = true;
                  break;
                }
              }
            }

            // Jeśli po przesunięciu wychodzimy poza dzień — następny dzień
            if (slotStart >= dayEnd) {
              cursor = new Date(slotStart);
              cursor.setDate(cursor.getDate()+1); cursor.setHours(0,0,0,0);
              continue;
            }

            // Koniec slotu = min(dayEnd, następna rezerwacja)
            let slotEnd = new Date(dayEnd);
            for (const o of (occupancy[wc] || [])) {
              const oFrom = new Date(o.from);
              if (oFrom > slotStart && oFrom < slotEnd) slotEnd = oFrom;
            }

            const availH = (slotEnd - slotStart) / 3600000;
            if (availH < 0.0001) { cursor = new Date(slotEnd); continue; }

            const take   = Math.min(remaining, availH);
            remaining   -= take;
            const segEnd = new Date(slotStart.getTime() + take * 3600000);

            segs.push({ segStart: new Date(slotStart), segEnd: new Date(segEnd), durH: take });

            if (!occupancy[wc]) occupancy[wc] = [];
            occupancy[wc].push({ from: new Date(slotStart), to: new Date(segEnd) });
            occupancy[wc].sort((a,b) => new Date(a.from)-new Date(b.from));

            cursor = new Date(segEnd);
          }

          return {
            startDt: segs.length ? segs[0].segStart    : new Date(fromDt),
            endDt:   segs.length ? segs[segs.length-1].segEnd : new Date(fromDt),
            segments: segs,
          };
        }

        function forwardSchedule(zpList, routingByProduct, wcSchedule, planStart) {
          const occupancy = {};
          const result = [];
          const zpOpCounter = {};

          const sorted = [...zpList].sort((a, b) =>
            a.priority - b.priority || a.due_date.localeCompare(b.due_date)
          );

          sorted.forEach(zp => {
            const ops = (routingByProduct[zp.product] || [])
              .slice().sort((a, b) => a.sequence - b.sequence);
            if (!ops.length) return;

            const doneEnds = {}; // sequence → endDt (dla predecessors)
            const subOps = [];

            ops.forEach(op => {
              const durH = zp.volume * op.ct_min / 60;
              // cursor = max(końców predecessors) lub planStart
              let cursor = new Date(planStart);
              if (op.predecessors && op.predecessors.length > 0) {
                op.predecessors.forEach(seq => {
                  if (doneEnds[seq] && doneEnds[seq] > cursor)
                    cursor = new Date(doneEnds[seq]);
                });
              } else if (subOps.length > 0) {
                // brak predecessors i nie pierwsza op → sekwencja (stara logika)
                const prevEnd = subOps[subOps.length-1].end_dt;
                if (prevEnd && new Date(prevEnd) > cursor)
                  cursor = new Date(prevEnd);
              }
              const { startDt, endDt, segments } = forwardScheduleOp(
                cursor, durH, op.workcenter, wcSchedule, occupancy
              );
              doneEnds[op.sequence] = endDt;
              subOps.push({
                zp_id:      (() => { if (!zpOpCounter[zp.zp_id]) zpOpCounter[zp.zp_id]=0; zpOpCounter[zp.zp_id]++; return zp.zp_id+'/'+String(zpOpCounter[zp.zp_id]).padStart(3,'0'); })(),
                 parent_zp:  zp.zp_id,
                zs_id:      zp.zs_id || '',
                klient:     zp.klient || '',
                sub_id:     zp.zp_id + '/' + String(op.sequence).padStart(3,'0'),
                product:    zp.product,
                workcenter: op.workcenter,
                operation:  op.operation,
                sequence:   op.sequence,
                volume:     zp.volume,
                durH,
                start_dt:   startDt,
                end_dt:     endDt,
                segments,
                due_date:   zp.due_date,
                priority:   zp.priority,
              });
              cursor = new Date(endDt);
            });

            // realEnd = koniec ostatniej operacji
            const realEnd  = subOps.length ? subOps[subOps.length-1].end_dt : new Date(planStart);
            const dueDate  = new Date(zp.due_date + 'T23:59:59');
            const delayMs  = Math.max(0, realEnd - dueDate);
            const delayH   = delayMs / 3600000;
            const delayDays = +(delayH / 16).toFixed(1);

            result.push(...subOps.map(s => ({ ...s, realEnd, delayH, delayDays })));
          });

          return result;
        }

        // TOC buffer zones
        // backStart = idealny start z back-schedule
        // planStart = dziś
        // dueDate   = termin
        function tocBuffer(backStartDt, planStartDt, dueDateDt, realEndDt) {
          // Jeśli realEnd > dueDate → zawsze spóźnione, niezależnie od bufora
          if (realEndDt && realEndDt > dueDateDt) {
            const overH = (realEndDt - dueDateDt) / 3600000;
            return { zone: 'black', consumed: 1, label: 'SPÓŹNIONE', overH };
          }
          const bufferTotal = dueDateDt - backStartDt;
          if (bufferTotal <= 0) return { zone: 'black', consumed: 1, label: 'PRZEKROCZONY' };
          const bufferRemaining = dueDateDt - planStartDt;
          const consumed = 1 - bufferRemaining / bufferTotal;
          if (consumed < 0)    return { zone: 'green',  consumed, label: 'OK' };
          if (consumed < 0.33) return { zone: 'green',  consumed, label: 'OK' };
          if (consumed < 0.67) return { zone: 'yellow', consumed, label: 'UWAGA' };
          if (consumed < 1.0)  return { zone: 'red',    consumed, label: 'ZAGROŻONE' };
          return                      { zone: 'black',  consumed, label: 'SPÓŹNIONE' };
        }

        function tocColor(zone) {
          switch(zone) {
            case 'green':  return { bg: T.okBg,   border: T.ok,   text: T.ok   };
            case 'yellow': return { bg: T.warnBg, border: T.warn, text: T.warn };
            case 'red':    return { bg: T.bnBg,   border: T.bn,   text: T.bn   };
            case 'black':  return { bg: 'rgba(100,100,100,0.15)', border: T.text3, text: T.text3 };
            default:       return { bg: T.okBg,   border: T.ok,   text: T.ok   };
          }
        }


        // Helpers
        function fmtDt(dt) {
          if (!dt) return '';
          const d = new Date(dt);
          return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
        }


        function computeLoads(routingByProduct, zpList, wcSchedule, date) {
          const wcMap = {};

          // Wylicz cap per gniazdo z grafiku (jeśli podany)
          function getCapH(wc, fallback) {
            if (!wcSchedule || !date) return fallback || 8;
            const sched = wcSchedule[wc];
            if (!sched) return fallback || 16;
            // Nowy format: obiekt z datami { "2026-05-25": 16, ... }
            if (!Array.isArray(sched) && typeof sched === 'object') {
              const v = sched[date];
              return v !== undefined ? v : (() => {
                const jsDay = new Date(date+"T12:00:00").getDay();
                return (jsDay===0||jsDay===6) ? 0 : 16;
              })();
            }
            // Stary format: tablica [pon..nd]
            const jsDay = new Date(date + "T12:00:00").getDay();
            const idx = jsDay === 0 ? 6 : jsDay - 1;
            return sched[idx] !== undefined ? sched[idx] : 0;
          }

          zpList.forEach(z => {
            const ops = routingByProduct[z.product] || [];
            ops.forEach(op => {
              const capH = getCapH(op.workcenter, op.capacity_h);
              if (!wcMap[op.workcenter]) wcMap[op.workcenter] = { load: 0, cap: capH, contrib: {} };
              wcMap[op.workcenter].cap = capH; // odświeź
              const h = z.volume * op.ct_min / 60;
              wcMap[op.workcenter].load += h;
              if (!wcMap[op.workcenter].contrib[z.zp_id]) wcMap[op.workcenter].contrib[z.zp_id] = { h: 0, product: z.product };
              wcMap[op.workcenter].contrib[z.zp_id].h += h;
            });
          });
          Object.keys(wcMap).forEach(w => {
            wcMap[w].util = wcMap[w].cap > 0 ? wcMap[w].load / wcMap[w].cap : 999;
          });
          return wcMap;
        }


        function dlCSV(rows, filename) {
          const csv = rows.map(r => r.map(v => typeof v === 'string' && v.includes(';') ? `"${v}"` : v).join(";")).join("\n");
          const a = document.createElement("a");
          a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
          a.download = filename;
          a.click();
        }

        function uStatus(u) {
          if (u <= 0.85) return { label: "OK",    bg: T.okBg,   text: T.ok,   dot: T.ok };
          if (u <= 1.00) return { label: "UWAGA", bg: T.warnBg, text: T.warn, dot: T.warn };
          if (u <= 1.30) return { label: "BN",    bg: T.bnBg,   text: T.bn,   dot: T.bn };
          return                 { label: "KRYT", bg: T.critBg, text: T.crit, dot: T.crit };
        }

        // ─── STYLES ─────────────────────────────────────────────────────────────────
        const s = {

        // ─── KOMPONENTY WSPÓLNE ──────────────────────────────────────────────────────
        function Dot({ color, size = 8 }) {
          return <span style={{ display: "inline-block", width: size, height: size, borderRadius: "50%", background: color, flexShrink: 0 }} />;
        }

        // Poprawiony Bar, aby poprawnie obsługiwał gradient na czystym CSS bez ostrzeżeń
        function Bar({ value, max = 1, color, height = 6 }) {
          const utilPct = value / max;
          const displayPct = Math.min(utilPct * 100, 100);
          const isOverloaded = utilPct > 1.0;

          return (
            <div style={{ height, borderRadius: 3, background: T.border2, overflow: "hidden", flex: 1, minWidth: 60, position: "relative" }}>
              <div style={{ height: "100%", width: `${displayPct}%`, background: isOverloaded ? `linear-gradient(90deg, ${color} 70%, #dc2626 100%)` : color, borderRadius: 3, transition: "width 0.4s" }} />
              {isOverloaded && (
                <div style={{
                  position: "absolute", right: 0, top: 0, width: "15%", height: "100%",

        }

        function KpiCard({ label, value, sub, color }) {
          return (
            <div style={{ ...s.card, padding: "16px 18px" }}>

        }

        function DatePicker({ dates, selected, onChange, label = "Termin:" }) {

        function EmptyState({ icon, title, sub }) {
          return (

        }

        // ─── ZAKŁADKA: IMPORT ────────────────────────────────────────────────────────
        const DAY_NAMES = ['Nd','Pon','Wt','Śr','Czw','Pt','Sob'];
        function ImportTab({ routing, zp, onLoad }) {
          const [rLoaded, setRLoaded] = useState(routing.length > 0);

          return (

                  cols={[{n:"product",req:true},{n:"operation",req:true},{n:"workcenter",req:true},{n:"ct_min",req:true},{n:"sequence",req:true},{n:"capacity_h",req:false}]} />

              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 24 }}>
                {[
                  { title: "Przykład routing.csv", content: `product,operation,workcenter,ct_min,sequence,capacity_h\nP-KOD,Wycinanie,G-01,3,1,8\nP-KOD,Gięcie,G-02,8,2,8\nP-KOD,Spawanie,G-03,6,3,8` },
                  { title: "Przykład zs.csv", content: `zs_id,pozycja,klient,product,volume,due_date,priority\nZS-001,1,Kowalski,P-KOD,30,2026-05-25,1\nZS-001,2,Kowalski,P-KOD,20,2026-05-26,1\nZS-002,1,ABC Vent,P-TLU,25,2026-05-25,2` },
                ].map(ex => (
                  <div key={ex.title} style={s.card}>
                    <div style={s.cardTitle}>{ex.title}</div>
                    <pre style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: T.text2, lineHeight: 1.8, overflowX: "auto" }}>{ex.content}</pre>
                  </div>
                ))}
              </div>

              <div style={{ textAlign: "center" }}>
                <button
                  style={{ padding: "12px 32px", fontSize: 13, fontWeight: 600, borderRadius: 10, border: "none", background: T.accent, color: "#fff", cursor: "pointer" }}
                  onClick={() => onLoad(null, "demo")}
                >
                  Załaduj demo (routing + zs)
                </button>
              </div>
            </div>
          );
        }

        // ─── ZAKŁADKA: BOTTLENECK ────────────────────────────────────────────────────
        function BottleneckTab({ routing, zp, globalLookups, wcSchedule, subZP }) {
          const dates    = useMemo(() => [...new Set(zp.map(z => z.due_date))].sort(), [zp]);
          const allDates = useMemo(() => {
            const set = new Set(dates);
            if (subZP) subZP.forEach(s => {
              if (s.start_dt) set.add(localDateStr(new Date(s.start_dt)));
            });
            return [...set].sort();
          }, [dates.join(','), subZP ? subZP.length : 0]);

          const [date, setDate]  = useState(dates[0] || '');
          React.useEffect(() => { if (!date && dates.length) setDate(dates[0]); }, [dates.join(',')]);

          const products  = useMemo(() => [...new Set(routing.map(r => r.product))], [routing]);
          const zpForDate = useMemo(() => zp.filter(z => z.due_date === date), [zp.length, date]);
          const loads     = useMemo(() => {
            if (!date) return {};
            return computeLoads(globalLookups.routingByProduct, zpForDate, wcSchedule, date);
          }, [zpForDate.length, date, wcSchedule]);
          const entries   = useMemo(() => Object.entries(loads).sort((a,b) => b[1].util-a[1].util), [loads]);
          const maxU      = entries.length ? Math.max(...entries.map(([,v]) => v.util)) : 0;
          const bn        = entries[0]?.[0] || '–';

          if (!dates.length) return <EmptyState icon="📊" title="Brak danych" sub="Wgraj pliki w zakładce Import" />;

          const st = uStatus(maxU);

          // Kolor przycisku daty wg statusu (obliczamy tylko dla due_dates, lekko)
          function dateColor(d) {
            if (!dates.includes(d)) return { border: T.border, text: T.text3, bg: 'transparent' };
            const zpD = zp.filter(z => z.due_date === d);
            const lds = computeLoads(globalLookups.routingByProduct, zpD, wcSchedule, d);
            const u   = Object.values(lds).length ? Math.max(...Object.values(lds).map(v=>v.util)) : 0;
            if (u > 1.3) return { border: T.crit, text: T.crit, bg: T.critBg };
            if (u > 1.0) return { border: T.bn,   text: T.bn,   bg: T.bnBg   };
            if (u > 0.85)return { border: T.warn, text: T.warn, bg: T.warnBg };
            if (u > 0)   return { border: T.ok,   text: T.ok,   bg: T.okBg   };
            return              { border: T.border,text: T.text3,bg:'transparent' };
          }

          return (
            <div>
              {/* Nagłówek */}
              <div style={{ background:T.surface2, border:`1px solid ${T.border}`, borderRadius:10,
                padding:'10px 16px', marginBottom:16, display:'flex', gap:16, flexWrap:'wrap', alignItems:'center' }}>
                <div style={{ flex:1 }}>
                  <span style={{ fontSize:12, fontWeight:600, color:T.text }}>📊 Obciążenie per termin ZP</span>
                  <span style={{ fontSize:11, color:T.text3, marginLeft:10 }}>
                    Zapotrzebowanie h per gniazdo dla wybranego due_date · "Czy mam wystarczającą pojemność?"
                  </span>
                </div>
                <span style={{ fontSize:11, color:T.text3, borderLeft:`1px solid ${T.border}`, paddingLeft:12 }}>
                  Rozkład dzienny → <strong style={{color:T.accent}}>Grafik zasobów</strong>
                </span>
              </div>

              {/* KPI */}
              <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))', gap:12, marginBottom:20 }}>
                <KpiCard label="Bottleneck" value={bn} sub={`${Math.round(maxU*100)}% obciążenia`} color={st.text}/>
                <KpiCard label="Gniazda" value={entries.length} sub="aktywne"/>
                <KpiCard label="ZP na termin" value={zpForDate.length} sub={date}/>
                <KpiCard label="Terminów" value={dates.length} sub={`${dates[0]?.slice(5)} – ${dates[dates.length-1]?.slice(5)}`}/>
              </div>

              {/* Przyciski dat z kolorami */}
              <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:16, flexWrap:'wrap' }}>
                <span style={{ fontSize:12, color:T.text3 }}>Termin:</span>
                {allDates.map(d => {
                  const isDue = dates.includes(d);
                  const dc    = isDue ? dateColor(d) : { border:T.border, text:T.text3, bg:'transparent' };
                  const isSel = d === date;
                  return (
                    <button key={d} onClick={() => setDate(d)}
                      style={{ padding:'4px 10px', fontSize:11, fontWeight:isSel?700:400, borderRadius:6,
                        border:`1px solid ${isSel ? dc.border : isDue ? dc.border+'88' : T.border}`,
                        background: isSel ? dc.bg : 'transparent',
                        color: isSel ? dc.text : isDue ? dc.text : T.text3,
                        cursor:'pointer', opacity: isDue ? 1 : 0.55 }}>
                      {d.slice(5)}
                      {isDue && <span style={{ display:'inline-block', width:5, height:5,
                        borderRadius:'50%', background:dc.border, marginLeft:4, verticalAlign:'middle' }}/>}
                    </button>
                  );
                })}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 16, marginBottom: 16 }}>
                <div style={s.card}>
                  <div style={s.cardTitle}>Obciążenie vs Pojemność — {date}</div>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                    <thead>
                      <tr>{["Gniazdo","Load (h)","Cap (h)","Obciążenie","Status"].map(h => (
                        <th key={h} style={{ fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", color: T.text3, padding: "0 10px 10px", textAlign: "left", borderBottom: `1px solid ${T.border}` }}>{h}</th>
                      ))}</tr>
                    </thead>
                    <tbody>
                      {entries.map(([wc, v]) => {
                        const st2 = uStatus(v.util);
                        return (
                          <tr key={wc} style={{ background: v.util > 1 ? "rgba(239,68,68,0.03)" : "transparent" }}>
                            <td style={{ padding: "9px 10px", borderBottom: `1px solid ${T.border}`, fontWeight: 700, color: T.text }}>{wc}</td>
                            <td style={{ padding: "9px 10px", borderBottom: `1px solid ${T.border}`, color: T.text2, fontFamily: "monospace" }}>{v.load.toFixed(2)}</td>
                            <td style={{ padding: "9px 10px", borderBottom: `1px solid ${T.border}`, color: T.text3, fontFamily: "monospace" }}>{v.cap.toFixed(1)}</td>

                              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                <Bar value={v.util} max={1} color={st2.dot} />
                                <span style={{ fontSize: 12, color: T.text2, minWidth: 36, fontFamily: "monospace" }}>{Math.round(v.util * 100)}%</span>

                            <td style={{ padding: "9px 10px", borderBottom: `1px solid ${T.border}` }}>
                              <span style={s.badge(st2)}><Dot color={st2.dot} size={6} />{st2.label}</span>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>

                <div style={s.card}>
                  <div style={s.cardTitle}>Zlecenia na dzień {date}</div>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                    <thead>
                      <tr>{["ZP ID","Produkt","Ilość","Prio"].map(h => (
                        <th key={h} style={{ fontSize: 10, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", color: T.text3, padding: "0 8px 10px", textAlign: "left", borderBottom: `1px solid ${T.border}` }}>{h}</th>
                      ))}</tr>
                    </thead>
                    <tbody>
                      {[...zpForDate].sort((a, b) => a.priority - b.priority).map(zp2 => {
                        const col = globalLookups.zpColorMap[zp2.zp_id] || T.text2;
                        return (
                          <tr key={zp2.zp_id}>
                            <td style={{ padding: "8px", borderBottom: `1px solid ${T.border}` }}>
                              <code style={{ fontSize: 11, color: T.accent, background: T.accentBg, padding: "2px 6px", borderRadius: 4 }}>{zp2.zp_id}</code>
                            </td>
                            <td style={{ padding: "8px", borderBottom: `1px solid ${T.border}` }}>
                              <span style={{ display: "inline-flex", alignItems: "center", gap: 7 }}>
                                <Dot color={col} size={7} />
                                <span style={{ color: T.text }}>{zp2.product}</span>
                              </span>
                            </td>
                            <td style={{ padding: "8px", borderBottom: `1px solid ${T.border}`, color: T.text2, fontFamily: "monospace" }}>{zp2.volume} szt.</td>
                            <td style={{ padding: "8px", borderBottom: `1px solid ${T.border}`, color: T.text3 }}>{zp2.priority}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>

              {entries.length > 0 && loads[bn] && (() => {
                const bnData = loads[bn];
                const contribs = Object.entries(bnData.contrib);
                const totalLoad = bnData.load;
                return (
                  <div style={s.card}>
                    <div style={s.cardTitle}>Struktura obciążenia bottlenecku {bn} — {date}</div>
                    <div style={{ fontSize: 12, color: T.text2, marginBottom: 12 }}>
                      Łączny czas: <strong style={{ color: bnData.util > 1 ? T.bn : T.text }}>{bnData.load.toFixed(2)}h</strong> / {bnData.cap}h dostępu
                    </div>
                    <div style={{ display: "flex", height: 20, borderRadius: 6, overflow: "hidden", marginBottom: 16 }}>
                      {contribs.map(([zpid, v]) => {
                        const col = globalLookups.zpColorMap[zpid] || T.text3;
                        return <div key={zpid} style={{ width: `${totalLoad > 0 ? v.h / totalLoad * 100 : 0}%`, background: col }} />;
                      })}
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      {contribs.map(([zpid, v]) => {
                        const col = globalLookups.zpColorMap[zpid] || T.text3;
                        const pct = totalLoad > 0 ? v.h / totalLoad : 0;
                        return (

                            <span style={{ display: "flex", alignItems: "center", gap: 7 }}>
                              <Dot color={col} size={7} />
                              <code>{zpid}</code> <span style={{ color: T.text3 }}>({v.product})</span>
                            </span>
                            <span style={{ fontFamily: "monospace", color: T.text2 }}>{v.h.toFixed(2)}h ({Math.round(pct * 100)}%)</span>

                  </div>

        // ─── ZAKŁADKA: HEATMAPA ──────────────────────────────────────────────────────
        function HeatmapTab({ routing, zp, globalLookups, wcSchedule }) {
          const dates = useMemo(() => [...new Set(zp.map(z => z.due_date))].sort(), [zp.length]);
          const allWC = useMemo(() => [...new Set(routing.map(r => r.workcenter))].sort(), [routing.length]);
          
          const loadsCache = useMemo(() => {
            const c = {};
            dates.forEach(d => { 
              const zpForDate = zp.filter(z => z.due_date === d);
              c[d] = computeLoads(globalLookups.routingByProduct, zpForDate, wcSchedule, d); 
            });
            return c;
          }, [zp.length, dates.join(','), JSON.stringify(wcSchedule)]);

          if (!dates.length) return <EmptyState icon="🌡️" title="Brak danych" sub="Wgraj pliki CSV" />;

          function hmStyle(u) {
            if (u <= 0)   return { bg: T.surface2, color: T.text3 };
            if (u <= .85) return { bg: "rgba(34,197,94,0.12)",  color: "#22c55e" };
            if (u <= 1.0) return { bg: "rgba(245,158,11,0.15)", color: "#f59e0b" };
            if (u <= 1.1) return { bg: "rgba(249,115,22,0.15)", color: "#f97316" };
            if (u <= 1.3) return { bg: "rgba(239,68,68,0.15)",  color: "#ef4444" };
            return               { bg: "rgba(220,38,38,0.25)",  color: "#fca5a5" };
          }


          return (
            <div style={s.card}>
              <div style={s.cardTitle}>Obłożenie gniazd w czasie (Gniazdo x Termin)</div>
              <div style={{ overflowX: "auto" }}>
                <table style={{ borderCollapse: "collapse", fontSize: 12 }}>
                  <thead>
                    <tr>
                      <th style={{ padding: "0 16px 12px 0", textAlign: "left", fontSize: 10, fontWeight: 600, textTransform: "uppercase", color: T.text3 }}>Gniazdo</th>
                      {dates.map(d => (
                        <th key={d} style={{ padding: "0 6px 12px", textTransform: "uppercase", color: T.text3, fontSize: 10 }}>{d}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {allWC.map(w => (
                      <tr key={w}>
                        <td style={{ padding: "6px 16px 6px 0", fontWeight: 700, color: T.text, fontSize: 13 }}>{w}</td>
                        {dates.map(d => {
                          const u = loadsCache[d]?.[w]?.util || 0;
                          const hs = hmStyle(u);
                          return (
                            <td key={d} style={{ padding: "4px" }}>
                              <div style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 68, height: 28, borderRadius: 6, background: hs.bg, color: hs.color, fontSize: 11, fontWeight: 600, fontFamily: "monospace" }}>
                                {u > 0 ? `${Math.round(u * 100)}%` : "–"}
                              </div>
                            </td>
                          );
                        })}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        // ─── ZAKŁADKA: ROUTING (GRAF) ────────────────────────────────────────────────
        function RoutingTab({ routing, zp, globalLookups }) {
          const products = useMemo(() => [...new Set(routing.map(r => r.product))], [routing]);
          const dates = useMemo(() => [...new Set(zp.map(z => z.due_date))].sort(), [zp]);
          
          const firstDateZP = useMemo(() => dates.length ? zp.filter(z => z.due_date === dates[0]) : [], [zp, dates]);
          const wcLoads = useMemo(() => dates.length ? computeLoads(globalLookups.routingByProduct, firstDateZP) : {}, [dates.join(','), firstDateZP.length]);
          const maxUtil = Object.values(wcLoads).length ? Math.max(...Object.values(wcLoads).map(v => v.util)) : 0;
          
          if (!routing.length) return <EmptyState icon="🔀" title="Brak danych" sub="Wgraj routing.csv" />;

          const BW = 140, BH = 72, GAP = 48, ROW_H = 130, LEFT = 120;
          const maxOps = Math.max(...products.map(p => (globalLookups.routingByProduct[p] || []).length));
          const svgW = LEFT + maxOps * (BW + GAP) + 40;
          const svgH = products.length * ROW_H + 60;

          return (
            <div style={{ ...s.card, overflowX: "auto" }}>
              <div style={s.cardTitle}>Wizualizacja procesów technologicznych (Routingu)</div>
              <svg width="100%" viewBox={`0 0 ${svgW} ${svgH}`} style={{ display: "block" }}>
                <defs>
                  <marker id="ra" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
                    <path d="M1 1L9 5L1 9" fill="none" stroke="#555c6b" strokeWidth="1.5" />
                  </marker>
                </defs>
                {products.map((p, pi) => {
                  const rowY = 30 + pi * ROW_H;
                  const boxY = rowY + (ROW_H - 30 - BH) / 2;
                  const ops = globalLookups.routingByProduct[p] || [];
                  const col = PALETTE[globalLookups.productIndexMap[p] % PALETTE.length];
                  return (
                    <g key={p}>
                      {pi > 0 && <line x1="0" y1={rowY - 10} x2={svgW} y2={rowY - 10} stroke={T.border} />}
                      <text x={LEFT - 25} y={boxY + BH / 2} fontSize="13" fontWeight="700" fill={col} textAnchor="middle" dominantBaseline="central">{p}</text>
                      {ops.map((op, oi) => {
                        const boxX = LEFT + oi * (BW + GAP);
                        const wcData = wcLoads[op.workcenter] || { util: 0 };
                        const u = wcData.util;
                        const isBn = Math.abs(u - maxUtil) < 0.001 && u > 0.85;
                        return (
                          <g key={oi}>
                            <rect x={boxX} y={boxY} width={BW} height={BH} rx="8" fill={T.surface2} stroke={isBn ? T.bn : T.border2} strokeWidth={isBn ? 2 : 1} />
                            <rect x={boxX} y={boxY} width={BW} height={4} fill={col} rx="2" />
                            <text x={boxX + BW / 2} y={boxY + 22} textAnchor="middle" fontSize="13" fontWeight="700" fill={T.text}>{op.workcenter}</text>
                            <text x={boxX + BW / 2} y={boxY + 40} textAnchor="middle" fontSize="10" fill={T.text2}>{op.operation}</text>
                            <text x={boxX + BW / 2} y={boxY + 58} textAnchor="middle" fontSize="10" fill={T.text3}>{op.ct_min} min</text>
                            {oi < ops.length - 1 && (
                              <line x1={boxX + BW + 2} y1={boxY + BH / 2} x2={boxX + BW + GAP - 4} y2={boxY + BH / 2} stroke="#555c6b" strokeWidth="1.5" markerEnd="url(#ra)" />
                            )}
                          </g>
                        );
                      })}
                    </g>
                  );
                })}
              </svg>
            </div>
          );
        }

        // ─── ZAKŁADKA: SWIMLANE ──────────────────────────────────────────────────────
        function SwimlaneTab({ routing, zp, globalLookups, wcSchedule }) {
          const dates = useMemo(() => [...new Set(zp.map(z => z.due_date))].sort(), [zp]);
          const [date, setDate] = useState(dates[0] || "");
          const allWC = useMemo(() => [...new Set(routing.map(r => r.workcenter))].sort(), [routing]);
          
          const zpForDate = useMemo(() => zp.filter(z => z.due_date === date), [zp, date]);
          const loads = useMemo(() => date ? computeLoads(globalLookups.routingByProduct, zpForDate, wcSchedule, date) : {}, [globalLookups.routingByProduct, zpForDate, wcSchedule, date]);
          const maxUtil = Object.values(loads).length ? Math.max(...Object.values(loads).map(v => v.util)) : 0;
          
          if (!dates.length) return <EmptyState icon="🏊" title="Brak danych" sub="Wgraj pliki CSV" />;

          const LANE_H = 80, LABEL_W = 120, CAP_W = 500;
          const svgW = LABEL_W + CAP_W + 80;
          const svgH = allWC.length * LANE_H;

          return (
            <div>
              <DatePicker dates={dates} selected={date} onChange={setDate} />
              <div style={{ ...s.card, padding: 0, overflowX: "auto" }}>
                <svg width="100%" viewBox={`0 0 ${svgW} ${svgH}`} style={{ display: "block" }}>
                  {allWC.map((w, wi) => {
                    const y = wi * LANE_H;
                    const wcData = loads[w] || { util: 0, cap: 8, load: 0, contrib: {} };
                    const isBn = Math.abs(wcData.util - maxUtil) < 0.001 && wcData.util > 0.85;
                    const scale = wcData.load > 0 ? Math.min(CAP_W / (wcData.cap * 1.4), CAP_W / (wcData.load * 1.05)) : CAP_W / wcData.cap;
                    let curX = LABEL_W + 10;
                    return (
                      <g key={w}>
                        <rect x="0" y={y} width={svgW} height={LANE_H} fill={wi % 2 === 0 ? T.surface : T.surface2} />
                        <text x="20" y={y + LANE_H / 2 + 4} fontSize="13" fontWeight="700" fill={isBn ? T.bn : T.text}>{w} ({wcData.cap}h)</text>
                        <line x1={LABEL_W + 10 + wcData.cap * scale} y1={y + 5} x2={LABEL_W + 10 + wcData.cap * scale} y2={y + LANE_H - 5} stroke="#555c6b" strokeDasharray="4 3" />
                        {Object.entries(wcData.contrib).map(([zpid, v]) => {
                          const col = globalLookups.zpColorMap[zpid] || T.text3;
                          const w_px = v.h * scale;
                          const block = (
                            <g key={zpid}>
                              <rect x={curX} y={y + 15} width={w_px} height={LANE_H - 30} rx="4" fill={col} opacity="0.85" />
                              {w_px > 35 && <text x={curX + w_px / 2} y={y + LANE_H / 2 + 4} textAnchor="middle" fontSize="10" fontWeight="600" fill="white">{zpid}</text>}
                            </g>
                          );
                          curX += w_px + 2;
                          return block;
                        })}
                        <text x={curX + 10} y={y + LANE_H / 2 + 4} fontSize="11" fontWeight="700" fill={T.text2}>{Math.round(wcData.util * 100)}%</text>
                      </g>
                    );
                  })}
                </svg>
              </div>
            </div>
          );
        }

        // ─── ZAKŁADKA: GANTT ─────────────────────────────────────────────────────────
        function GanttTab({ routing, zp, globalLookups, wcSchedule, subZP, fwdZP, zpStatus, onRecalc, ganttDirty, onViewChange, slaveMode, planStart, onPlanStartChange }) {
          const { useRef } = React;
          const allWC  = useMemo(() => [...new Set(routing.map(r => r.workcenter))].sort(), [routing]);
          const dates  = useMemo(() => [...new Set(zp.map(z => z.due_date))].sort(), [zp]);
          const allZP  = useMemo(() => [...zp].sort((a,b) => a.priority-b.priority || a.due_date.localeCompare(b.due_date)), [zp]);

          // Skale: px/h → odpowiadające tickStep i labelFormat
          const SCALES = [
            { key:'4h',  hourW:96,  tick:1,  label:'1h'  },
            { key:'8h',  hourW:56,  tick:2,  label:'2h'  },
            { key:'1d',  hourW:28,  tick:4,  label:'4h'  },
            { key:'3d',  hourW:14,  tick:8,  label:'8h'  },
            { key:'1w',  hourW:6,   tick:24, label:'1d'  },
            { key:'2w',  hourW:3,   tick:48, label:'2d'  },
          ];
          const [scaleIdx,  setScaleIdx]  = useState(2);
          const [panX,      setPanX]      = useState(0);
          const [isPan,     setIsPan]     = useState(false);
          const [tableOpen,  setTableOpen]  = useState(false);
          const [tooltip,    setTooltip]    = useState(null);
          const svgRef      = useRef(null);
          const panRef      = useRef(null);
          const containerRef = useRef(null);

          // Callback do PlanTab gdy view się zmienia — PO wszystkich hookach
          React.useEffect(() => {
            if (onViewChange) onViewChange({ panX, scaleIdx, hourW: SCALES[scaleIdx].hourW });
          }, [panX, scaleIdx]);

          const scale  = SCALES[scaleIdx];
          const HOUR_W = scale.hourW;

          React.useEffect(() => { /* skala zmienia HOUR_W, panX zostaje */ }, [scaleIdx]);
          // ── INTERAKCJA ────────────────────────────────────────────────────
          // useEffect: wheel + passive:false (React wheel jest pasywny)
          React.useEffect(() => {
            const el = containerRef.current; if (!el) return;
            function onWheel(e) {
              e.preventDefault();
              if (e.ctrlKey || e.metaKey) {
                // Ctrl+scroll → zoom skali
                if (e.deltaY < 0) setScaleIdx(v => Math.max(0, v-1));
                else              setScaleIdx(v => Math.min(SCALES.length-1, v+1));
              } else {
                // scroll → pan poziomy
                setPanX(v => {
                  const maxPan = 0;
                  const minPan = -(contentW - 200);
                  return Math.min(maxPan, Math.max(minPan, v - e.deltaY * 1.5));
                });
              }
            }
            el.addEventListener('wheel', onWheel, { passive: false });
            return () => el.removeEventListener('wheel', onWheel);
          }, [contentW, SCALES.length]);

          if (!dates.length) return <EmptyState icon="📅" title="Brak danych" sub="Wgraj pliki CSV" />;

          // Używaj forward-scheduled danych jeśli dostępne, inaczej back-scheduled
          const displayZP = (fwdZP && fwdZP.length) ? fwdZP : subZP;
          const planStartDt = new Date((planStart || '2026-05-22') + 'T00:00:00');

          // ── LAYOUT ────────────────────────────────────────────────────────
          const allSegs   = displayZP.flatMap(s => s.segments || []);
          const allStarts = allSegs.map(s => s.segStart).filter(Boolean);
          const allEnds   = allSegs.map(s => s.segEnd).filter(Boolean);
          const allDues   = dates.map(d => new Date(d + 'T23:59:59'));
          // axisEnd = max(due_dates, segment ends) — obejmuje spóźnione bloki
          const maxDueDt = new Date(Math.max(
            ...allDues.map(d=>d.getTime()),
            ...allEnds.map(d=>new Date(d).getTime()),
            new Date(planStartDt).getTime() + 7*24*3600000  // min 7 dni od dziś
          ));
          const minDt = new Date(planStartDt); // zawsze zacznij od planStart

          // axisStart = planStart (synchronizacja z Grafikiem zasobów)
          const axisStart = new Date(planStartDt); axisStart.setHours(0,0,0,0);
          const axisEnd   = new Date(maxDueDt); axisEnd.setHours(24,0,0,0);
          const totalH    = Math.max((axisEnd-axisStart)/3600000, 16);

          const LABEL_W = 110, LANE_H = 54, TOP = 56;
          const contentW = Math.ceil(totalH) * HOUR_W;  // szerokość całej osi
          const svgH     = TOP + allWC.length * LANE_H + 16;

          // xOf zwraca pozycję w przestrzeni SVG (przed panX)
          function xOf(dt) {
            return LABEL_W + Math.max(0, (new Date(dt)-axisStart)/3600000) * HOUR_W;
          }

          // Ticki
          const ticks = [];
          const tickH = scale.tick;
          for (let t=new Date(axisStart); t<=axisEnd; t.setHours(t.getHours()+tickH)) {
            ticks.push(new Date(t));
          }

          // Niedostępne strefy
          const unavailZones = [];
          const dayIter = new Date(axisStart);
          while (dayIter <= axisEnd) {
            allWC.forEach((wc, wi) => {
              const avail = getAvail(wc, dayIter, wcSchedule);
              const ds = new Date(dayIter); ds.setHours(0,0,0,0);
              const de = new Date(dayIter); de.setHours(24,0,0,0);
              if (avail===0) unavailZones.push({wi, x1:xOf(ds), x2:xOf(de)});
              else if (avail<24) {
                const we=new Date(dayIter); we.setHours(avail,0,0,0);
                unavailZones.push({wi, x1:xOf(we), x2:xOf(de)});
              }
            });
            dayIter.setDate(dayIter.getDate()+1);
          }

          const loads   = computeLoads(globalLookups.routingByProduct, allZP, wcSchedule, dates[0]);
          const maxUtil = Object.values(loads).length ? Math.max(...Object.values(loads).map(v=>v.util)) : 0;


          // Przy zmianie skali — zachowaj relative position (nie resetuj do 0)

          function onBgMouseDown(e) {
            const tag = e.target.tagName;
            const isBg = (tag==='rect' && (e.target.getAttribute('fill')==='transparent' || e.target.getAttribute('data-bg')==='1')) || tag==='svg';
            if (isBg) {
              panRef.current = { startX: e.clientX, startPanX: panX };
              setIsPan(true);
            }
          }
          function onMouseMove(e) {
            if (!panRef.current) return;
            const dx = e.clientX - panRef.current.startX;
            const newPan = panRef.current.startPanX + dx;
            const minPan = -(contentW - 200);
            setPanX(Math.min(0, Math.max(minPan, newPan)));
          }
          function onMouseUp() { panRef.current = null; setIsPan(false); }

          // Scrollbar thumb
          const containerW = 900; // przybliżona szerokość kontenera
          const visibleW   = containerW - LABEL_W;
          const thumbPct   = Math.min(1, visibleW / contentW);
          const thumbPos   = contentW > 0 ? (-panX / contentW) * 100 : 0;

          return (
            <div>
              {/* Controls */}
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12, flexWrap:'wrap' }}>
                <span style={{ fontSize:13, color:T.text2 }}>
                  <strong style={{color:T.text}}>{dates[0]?.slice(5)} – {dates[dates.length-1]?.slice(5)}</strong>
                  &nbsp;·&nbsp; {allZP.length} ZP &nbsp;·&nbsp; {allWC.length} gniazd
                </span>
                <div style={{ display:'flex', alignItems:'center', gap:6, background:T.surface2, padding:'4px 10px', borderRadius:8, border:`1px solid ${T.border}` }}>
                  <span style={{ fontSize:11, color:T.text3 }}>Planuj od:</span>
                  <input type="date" value={planStart || '2026-05-22'}
                    onChange={e => onPlanStartChange && onPlanStartChange(e.target.value)}
                    style={{ fontSize:11, background:'transparent', border:'none', color:T.text, cursor:'pointer', outline:'none' }}/>
                </div>

                {/* Skala */}
                <div style={{ display:'flex', gap:2, background:T.surface2, borderRadius:8, padding:2, marginLeft:8 }}>
                  {SCALES.map((sc,i) => (
                    <button key={sc.key} onClick={() => setScaleIdx(i)}
                      style={{ padding:'4px 10px', fontSize:11, fontWeight:600, borderRadius:6, border:'none',
                        background: i===scaleIdx ? T.accent : 'transparent',
                        color: i===scaleIdx ? '#fff' : T.text3, cursor:'pointer' }}>
                      {sc.key}
                    </button>
                  ))}
                </div>


                <div style={{ display:'flex', gap:4, marginLeft:'auto', alignItems:'center' }}>
                  <span style={{ fontSize:10, color:T.text3 }}>
                    Ctrl+scroll=zoom &nbsp;·&nbsp; scroll=pan &nbsp;·&nbsp; drag=pan
                  </span>
                  <button onClick={() => { setPanX(0); setScaleIdx(2); }}
                    style={{ ...s.btn(false), fontSize:11, padding:'4px 10px' }}>⊡ Reset</button>
                  <button onClick={onRecalc}
                    style={{ padding:'6px 14px', fontSize:12, fontWeight:600, borderRadius:8, border:'none',
                      background: ganttDirty ? T.accent : T.surface3,
                      color: ganttDirty ? '#fff' : T.text3, cursor:'pointer' }}>
                    {ganttDirty ? '⟳ Przelicz' : '✓ OK'}
                  </button>
                </div>
              </div>

              {/* Legenda ZP */}
              <div style={{ display:'flex', gap:12, fontSize:11, color:T.text3, marginBottom:8, flexWrap:'wrap', alignItems:'center' }}>
                {allZP.map(zp2 => {
                  const col = globalLookups.zpColorMap[zp2.zp_id] || T.text3;
                  return <span key={zp2.zp_id} style={{display:'flex',alignItems:'center',gap:4}}>
                    <Dot color={col} size={7}/>{zp2.zp_id}
                  </span>;
                })}
                <span style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:5}}>
                  <span style={{width:14,height:3,background:T.bn,display:'inline-block',borderRadius:2}}/>
                  due_date
                </span>
                <span style={{display:'flex',alignItems:'center',gap:5}}>
                  <span style={{width:14,height:12,background:'rgba(0,0,0,0.25)',display:'inline-block',borderRadius:2}}/>
                  niedostępne
                </span>
              </div>

              {/* SVG Gantt */}
              <div style={{...s.card, padding:0, overflow:'hidden'}}>
                <div ref={containerRef}
                  style={{ background:T.ganttBg, borderRadius:12, overflow:'hidden',
                    height:'calc(100vh - 240px)', minHeight:380,
                    cursor: isPan ? 'grabbing' : 'default', userSelect:'none',
                    position:'relative' }}
                  onMouseDown={onBgMouseDown}
                  onMouseMove={onMouseMove}
                  onMouseUp={onMouseUp}
                  onMouseLeave={onMouseUp}
                >
                  {displayZP.length === 0
                    ? <div style={{padding:'48px',textAlign:'center',color:T.text3,fontSize:13}}>
                        Kliknij <strong style={{color:T.accent}}>⟳ Przelicz</strong> aby zaplanować
                      </div>
                    : <svg ref={svgRef} width="100%" height="100%" style={{display:'block'}}>
                        <defs>
                          {/* clipPath ogranicza scrollowaną zawartość do obszaru za kolumną */}
                          <clipPath id="ganttClip">
                            <rect x={LABEL_W} y="0" width="10000" height="10000"/>
                          </clipPath>
                        </defs>

                        {/* Tło całego SVG */}
                        <rect x="0" y="0" width="100%" height="100%" fill={T.ganttBg} data-bg="1"/>

                        {/* SCROLLOWANA zawartość — tło lanes, ticki, bloki */}
                        <g clipPath="url(#ganttClip)">
                          <g transform={`translate(${panX},0)`}>

                          {/* Lane backgrounds (tylko prawa część) */}
                          {allWC.map((w,wi) => (
                            <rect key={`bg-${w}`} x={LABEL_W} y={TOP+wi*LANE_H}
                              width={contentW+40} height={LANE_H}
                              fill={wi%2===0?T.surface:T.surface2}/>
                          ))}
                          {/* Linie poziome lane */}
                          {allWC.map((_,wi) => (
                            <line key={`hl-${wi}`} x1={LABEL_W} y1={TOP+(wi+1)*LANE_H}
                              x2={LABEL_W+contentW+40} y2={TOP+(wi+1)*LANE_H}
                              stroke={T.border} strokeWidth="0.5"/>
                          ))}

                          {/* Niedostępne strefy */}
                          {unavailZones.map((z,zi) => (
                            <rect key={`uz${zi}`} x={z.x1} y={TOP+z.wi*LANE_H+1}
                              width={Math.max(z.x2-z.x1,0)} height={LANE_H-2}

              {/* Tabela pod-ZP — accordion */}

                              </td>
                              <td style={{padding:'7px 8px',borderBottom:`1px solid ${T.border}`}}>
                                <span style={{display:'flex',alignItems:'center',gap:5}}><Dot color={col} size={7}/>{s2.zp_id}</span>

                              <td style={{padding:'7px 8px',borderBottom:`1px solid ${T.border}`,fontFamily:'monospace',color:T.text2,whiteSpace:'nowrap'}}>{fmtDt(s2.start_dt)}</td>
                              <td style={{padding:'7px 8px',borderBottom:`1px solid ${T.border}`,fontFamily:'monospace',color:isOver?T.bn:T.text2,fontWeight:isOver?600:400,whiteSpace:'nowrap'}}>{fmtDt(s2.end_dt)}</td>
                              <td style={{padding:'7px 8px',borderBottom:`1px solid ${T.border}`,fontFamily:'monospace',color:T.text3}}>{s2.durH.toFixed(1)}h</td>
                              <td style={{padding:'7px 8px',borderBottom:`1px solid ${T.border}`}}>
                                <span style={{display:'inline-flex',padding:'2px 7px',borderRadius:5,fontSize:10,fontWeight:600,background:st.bg,color:st.color}}>{st.label}</span>
