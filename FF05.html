          );
        }



        // ─── ZAKŁADKA: SANKEY / STRUKTURA PRZEPŁYWU (NOWOŚĆ) ────────────────────────
        function SankeyTab({ routing, zp, globalLookups, wcSchedule }) {
          const { useRef } = React;
          const dates    = useMemo(() => [...new Set(zp.map(z => z.due_date))].sort(), [zp]);
          const products = useMemo(() => [...new Set(routing.map(r => r.product))], [routing]);
          const [date,       setDate]       = useState(dates[0] || "");
          const [hoveredWC,  setHoveredWC]  = useState(null);
          const [nodePos,    setNodePos]     = useState({});
          const [view, setView] = useState({ scale: 1, tx: 0, ty: 0 });
          const dragging  = useRef(null);   // { kind:'node'|'pan', wc?, ox, oy }
          const svgRef    = useRef(null);

          React.useEffect(() => { if (!date && dates.length) setDate(dates[0]); }, [dates]);

          // ── BASE LAYOUT (auto, product-lane Y) ──────────────────────────────
          const baseLayout = useMemo(() => {
            if (!routing.length) return { positions: {}, SVG_W: 800, SVG_H: 400 };
            const allWCs   = [...new Set(routing.map(r => r.workcenter))];
            const numProds = products.length;
            const PAD_X    = 90, PAD_Y = 80, COL_W = 190, LANE_H = 130;
            const SVG_H    = PAD_Y * 2 + Math.max(numProds - 1, 0) * LANE_H;
            const prodLaneY = {};
            products.forEach((p, i) => {
              prodLaneY[p] = numProds === 1 ? SVG_H / 2 : PAD_Y + i * LANE_H;
            });
            const wcMinSeq = {};
            allWCs.forEach(wc => {
              const seqs = routing.filter(r => r.workcenter === wc).map(r => r.sequence);
              wcMinSeq[wc] = Math.min(...seqs);
            });
            const colKeys = [...new Set(Object.values(wcMinSeq))].sort((a, b) => a - b);
            const SVG_W   = PAD_X * 2 + Math.max(colKeys.length - 1, 0) * COL_W;
            const positions = {};
            allWCs.forEach(wc => {
              const users  = products.filter(p => routing.some(r => r.product === p && r.workcenter === wc));
              const avgY   = users.reduce((s, p) => s + prodLaneY[p], 0) / (users.length || 1);
              const colIdx = colKeys.indexOf(wcMinSeq[wc]);
              const x      = PAD_X + colIdx * COL_W;
              const op     = routing.find(r => r.workcenter === wc);
              positions[wc] = { x, y: avgY, label: op ? op.operation.substring(0, 16) : wc };
            });
            return { positions, SVG_W, SVG_H };
          }, [routing, products]);

          // ── LOAD SAVED POSITIONS from localStorage ──────────────────────────
          React.useEffect(() => {
            if (!routing.length) return;
            const key = "flowops_nodepos_" + [...new Set(routing.map(r => r.workcenter))].sort().join(",");
            try {
              const saved = JSON.parse(localStorage.getItem(key) || "{}");
              if (Object.keys(saved).length) setNodePos(saved);
            } catch(e) {}
          }, [routing]);

          // Merge base layout with drag overrides
          const allPositions = useMemo(() => {
            const merged = {};
            Object.entries(baseLayout.positions).forEach(([wc, base]) => {
              merged[wc] = nodePos[wc]
                ? { ...base, x: nodePos[wc].x, y: nodePos[wc].y }
                : { ...base };
            });
            return merged;
          }, [baseLayout, nodePos]);

          const SVG_W = baseLayout.SVG_W;
          const SVG_H = baseLayout.SVG_H;

          // ── FLOW DATA ────────────────────────────────────────────────────────
          const flowData = useMemo(() => {
            if (!date) return { connections: [], edgeTotals: {}, nodeVolumes: {}, loads: {} };
            const zpForDate = zp.filter(z => z.due_date === date);
            const loads     = computeLoads(globalLookups.routingByProduct, zpForDate, wcSchedule, date);
            const nodeVolumes = {}, productConns = {};
            zpForDate.forEach(order => {
              const ops = globalLookups.routingByProduct[order.product] || [];
              ops.forEach((op, idx) => {
                nodeVolumes[op.workcenter] = (nodeVolumes[op.workcenter] || 0) + order.volume;
                if (idx < ops.length - 1) {
                  const next = ops[idx + 1];
                  const key  = `${order.product}||${op.workcenter}->${next.workcenter}`;
                  if (!productConns[key]) productConns[key] = { product: order.product, from: op.workcenter, to: next.workcenter, volume: 0 };
                  productConns[key].volume += order.volume;
                }
              });
            });
            const edgeTotals = {};
            Object.values(productConns).forEach(c => {
              const k = `${c.from}->${c.to}`;
              edgeTotals[k] = (edgeTotals[k] || 0) + c.volume;
            });
            return { connections: Object.values(productConns), edgeTotals, nodeVolumes, loads };
          }, [zp.length, date]);

          const maxVolume  = Math.max(...Object.values(flowData.edgeTotals), 1);
          const maxNodeVol = Math.max(...Object.values(flowData.nodeVolumes), 1);
          const maxUtil    = Object.values(flowData.loads).length
            ? Math.max(...Object.values(flowData.loads).map(v => v.util)) : 0;

          // ── EDGE PATH (cubic bezier, arc for skip edges) ─────────────────────
          function edgePath(fromPos, toPos, prodIdx, totalOnEdge) {
            const R   = 34;
            const dx  = toPos.x - fromPos.x, dy = toPos.y - fromPos.y;
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            const ux  = dx / dist, uy = dy / dist;
            const x1  = fromPos.x + ux * R, y1 = fromPos.y + uy * R;
            const x2  = toPos.x  - ux * R, y2 = toPos.y  - uy * R;
            const spread = totalOnEdge > 1 ? 14 : 0;
            const off    = totalOnEdge > 1 ? (prodIdx - (totalOnEdge - 1) / 2) * spread : 0;
            const px = -uy * off, py = ux * off;
            const arcLift = Math.abs(toPos.x - fromPos.x) > 250 ? -Math.abs(toPos.x - fromPos.x) * 0.25 : 0;
            const mx = (x1 + x2) / 2 + px, my = (y1 + y2) / 2 + py + arcLift;
            return {
              d: `M${x1.toFixed(1)} ${y1.toFixed(1)} C${(x1+(mx-x1)*0.5).toFixed(1)} ${(y1+(my-y1)*0.5).toFixed(1)},${(x2+(mx-x2)*0.5).toFixed(1)} ${(y2+(my-y2)*0.5).toFixed(1)},${x2.toFixed(1)} ${y2.toFixed(1)}`,
              mx, my,
            };
          }

          const edgeProdCount = {};
          flowData.connections.forEach(c => {
            const k = `${c.from}->${c.to}`;
            if (!edgeProdCount[k]) edgeProdCount[k] = [];
            if (!edgeProdCount[k].includes(c.product)) edgeProdCount[k].push(c.product);
          });

          function nodeStroke(u) {
            return u <= 0.85 ? T.ok : u <= 1.0 ? T.warn : T.bn;
          }

          // ── DRAG HANDLERS ────────────────────────────────────────────────────
          function svgPoint(e) {
            // Returns cursor position in SVG viewport pixels (before our g transform)
            const svg = svgRef.current;
            if (!svg) return { x: 0, y: 0 };
            const rect = svg.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
          }

          // ── NODE DRAG ────────────────────────────────────────────────────
          function onNodeMouseDown(e, wc) {
            e.stopPropagation();
            const { x, y } = svgPoint(e);
            const cur = allPositions[wc];
            dragging.current = { kind: "node", wc, ox: x - cur.x, oy: y - cur.y };
          }

          // ── PAN (drag on background) ──────────────────────────────────────
          function onSvgBgMouseDown(e) {
            if (e.target.tagName === "rect" && e.target.getAttribute("fill") === "transparent") {
              dragging.current = { kind: "pan", ox: e.clientX - view.tx, oy: e.clientY - view.ty };
            }
          }

          // ── WHEEL ZOOM (zoom toward cursor) ───────────────────────────────
          function onWheel(e) {
            e.preventDefault();
            const svg = svgRef.current;
            if (!svg) return;
            const rect  = svg.getBoundingClientRect();
            const mx    = e.clientX - rect.left;
            const my    = e.clientY - rect.top;
            const delta = e.deltaY < 0 ? 1.12 : 1 / 1.12;
            setView(v => {
              const ns = Math.min(3, Math.max(0.2, v.scale * delta));
              // zoom toward cursor: adjust tx/ty so point under cursor stays fixed
              return {
                scale: +ns.toFixed(3),
                tx: mx - (mx - v.tx) * (ns / v.scale),
                ty: my - (my - v.ty) * (ns / v.scale),
              };
            });
          }

          // ── UNIFIED MOUSE MOVE ────────────────────────────────────────────
          function onSvgMouseMove(e) {
            if (!dragging.current) return;
            if (dragging.current.kind === "pan") {
              const nx = e.clientX - dragging.current.ox;
              const ny = e.clientY - dragging.current.oy;
              setView(v => ({ ...v, tx: nx, ty: ny }));
            } else {
              // node drag — coordinates must be in SVG space (before transform)
              const { x, y } = svgPoint(e);
              // convert screen point to graph coords (undo view transform)
              const gx = (x - view.tx) / view.scale;
              const gy = (y - view.ty) / view.scale;
              const { wc, ox, oy } = dragging.current;
              setNodePos(prev => ({ ...prev, [wc]: { x: gx - ox, y: gy - oy } }));
            }
          }

          function onSvgMouseUp() {
            if (!dragging.current) return;
            if (dragging.current.kind === "node") {
              const key = "flowops_nodepos_" + [...new Set(routing.map(r => r.workcenter))].sort().join(",");
              setNodePos(prev => {
                try { localStorage.setItem(key, JSON.stringify(prev)); } catch(e) {}
                return prev;
              });
            }
            dragging.current = null;
          }

          function resetLayout() {
            const key = "flowops_nodepos_" + [...new Set(routing.map(r => r.workcenter))].sort().join(",");
            try { localStorage.removeItem(key); } catch(e) {}
            setNodePos({});
          }

          if (!dates.length) return <EmptyState icon="🌊" title="Brak danych" sub="Wgraj pliki CSV" />;

          return (
            <div>
              {/* Controls row */}
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 12, flexWrap: "wrap" }}>
                {/* Przyciski dat — kolory wg statusu bottleneck */}
              <DatePicker dates={dates} selected={date} onChange={setDate} />
                <div style={{ marginLeft: "auto", display: "flex", gap: 6, alignItems: "center" }}>
                  <button style={{ ...s.btn(false), fontSize: 13, padding: "4px 11px", fontWeight: 600 }}
                    onClick={() => setView(v => ({ ...v, scale: Math.max(0.25, +(v.scale - 0.15).toFixed(2)) }))}>−</button>
                  <span style={{ fontSize: 12, color: T.text2, minWidth: 38, textAlign: "center" }}>{Math.round(view.scale * 100)}%</span>
                  <button style={{ ...s.btn(false), fontSize: 13, padding: "4px 11px", fontWeight: 600 }}
                    onClick={() => setView(v => ({ ...v, scale: Math.min(3, +(v.scale + 0.15).toFixed(2)) }))}>+</button>
                  <button style={{ ...s.btn(false), fontSize: 11, padding: "4px 10px" }}
                    onClick={() => setView({ scale: 1, tx: 0, ty: 0 })}>⊡ Fit</button>
                  <button style={{ ...s.btn(false), fontSize: 11, padding: "4px 10px" }} onClick={resetLayout}>↺ Reset</button>
                </div>
              </div>

              {/* Legend */}
              <div style={{ display: "flex", gap: 14, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
                <div style={{ display: "flex", gap: 14, fontSize: 12, color: T.text2, background: T.surface, padding: "8px 14px", borderRadius: 8, border: `1px solid ${T.border}`, flexWrap: "wrap" }}>
                  <span style={{ display:"flex", alignItems:"center", gap:5 }}><Dot color={T.ok}   size={7}/> OK ≤85%</span>
                  <span style={{ display:"flex", alignItems:"center", gap:5 }}><Dot color={T.warn} size={7}/> Uwaga 86–100%</span>
                  <span style={{ display:"flex", alignItems:"center", gap:5 }}><Dot color={T.bn}   size={7}/> BN &gt;100%</span>
                  <span style={{ color: T.text3 }}>· Grubość = wolumen · Kolor = produkt · Przeciągnij węzeł</span>
                </div>
                <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
                  {products.map((p, i) => (
                    <span key={p} style={{ display:"flex", alignItems:"center", gap:5, fontSize:11, color:T.text2 }}>
                      <span style={{ width:22, height:3, borderRadius:2, background:PALETTE[i%PALETTE.length], display:"inline-block" }}/>
                      {p}
                    </span>
                  ))}
                </div>
              </div>

              <div style={{ ...s.card, padding: 0, overflow: "hidden" }}>
                <div style={{ background: "#090b0e", borderRadius: 12, overflow: "hidden", height: Math.max(SVG_H + 40, 420) }}>
                  <svg
                    ref={svgRef}
                    width="100%"
                    height="100%"
                    style={{ display: "block", cursor: dragging.current?.kind === "pan" ? "grabbing" : "default", userSelect: "none" }}
                    onMouseMove={onSvgMouseMove}
                    onMouseUp={onSvgMouseUp}
                    onMouseLeave={onSvgMouseUp}
                    onMouseDown={onSvgBgMouseDown}
                    onWheel={onWheel}
                  >
                    {/* invisible bg for pan */}
                    <rect x="0" y="0" width="100%" height="100%" fill="transparent"/>
                    <g transform={`translate(${view.tx},${view.ty}) scale(${view.scale})`}>
                    <defs>
                      {products.map((p, i) => (
                        <marker key={p} id={`arr-${i}`}
                          viewBox="0 0 10 10" refX="8" refY="5"
                          markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                          <path d="M1 1.5L8 5L1 8.5" fill="none"
                            stroke={PALETTE[i % PALETTE.length]}
                            strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                        </marker>
                      ))}
                    </defs>

                    {/* ── EDGES ── */}
                    {flowData.connections.map(conn => {
                      const fromPos = allPositions[conn.from];
                      const toPos   = allPositions[conn.to];
                      if (!fromPos || !toPos) return null;
                      const prodIdx     = products.indexOf(conn.product);
                      const col         = PALETTE[prodIdx % PALETTE.length];
                      const edgeKey     = `${conn.from}->${conn.to}`;
                      const prodsOnEdge = edgeProdCount[edgeKey] || [conn.product];
                      const myIdx       = prodsOnEdge.indexOf(conn.product);
                      const { d, mx, my } = edgePath(fromPos, toPos, myIdx, prodsOnEdge.length);
                      const isHov = hoveredWC === conn.from || hoveredWC === conn.to;
                      const thick = 1.5 + (flowData.edgeTotals[edgeKey] / maxVolume) * 12;
                      return (
                        <g key={`${conn.product}-${conn.from}-${conn.to}`}>
                          {isHov && <path d={d} fill="none" stroke={col} strokeWidth={thick+6} opacity="0.12" strokeLinecap="round"/>}
                          <path d={d} fill="none" stroke={col} strokeWidth={thick} strokeLinecap="round"
                            opacity={hoveredWC && !isHov ? 0.1 : 0.55}
                            markerEnd={`url(#arr-${prodIdx % PALETTE.length})`}/>
                        </g>
                      );
                    })}

                    {/* ── EDGE LABELS ── */}
                    {Object.entries(flowData.edgeTotals).map(([key, vol]) => {
                      const [from, to] = key.split("->").map(s => s.trim());
                      const fp = allPositions[from], tp = allPositions[to];
                      if (!fp || !tp) return null;
                      const isHov = hoveredWC === from || hoveredWC === to;
                      if (hoveredWC && !isHov) return null;
                      const mx = (fp.x + tp.x) / 2, my = (fp.y + tp.y) / 2;
                      const arcLift = Math.abs(tp.x - fp.x) > 250 ? -Math.abs(tp.x - fp.x) * 0.25 : 0;
                      return (
                        <g key={`lbl-${key}`}>
                          <rect x={mx-24} y={my+arcLift-10} width="48" height="18" rx="5"
                            fill="#090b0e" stroke={T.border2} strokeWidth="0.5"/>
                          <text x={mx} y={my+arcLift+4} textAnchor="middle"
                            fontSize="10" fontWeight="600" fill={T.text2} fontFamily="monospace">
                            {vol} szt.
                          </text>
                        </g>
                      );
                    })}

                    {/* ── NODES ── */}
                    {Object.entries(allPositions).map(([wc, pos]) => {
                      const volume = flowData.nodeVolumes[wc] || 0;
                      if (volume === 0) return null;
                      const wcData = flowData.loads[wc] || { util: 0 };
                      const u      = wcData.util;
                      const stroke = nodeStroke(u);
                      const isBn   = Math.abs(u - maxUtil) < 0.001 && u > 0.85;
                      const isHov  = hoveredWC === wc;
                      const r      = 28 + (volume / maxNodeVol) * 10;
                      const uPct   = Math.round(u * 100);
                      const dimmed = hoveredWC && !isHov ? 0.25 : 1;
                      return (
                        <g key={wc}
                          style={{ cursor: "grab", opacity: dimmed, transition: dragging.current ? "none" : "opacity 0.15s" }}
                          onMouseDown={e => onNodeMouseDown(e, wc)}
                          onMouseEnter={() => { if (!dragging.current) setHoveredWC(wc); }}
                          onMouseLeave={() => { if (!dragging.current) setHoveredWC(null); }}
                        >
                          {isBn && <circle cx={pos.x} cy={pos.y} r={r+9}
                            fill="none" stroke={T.crit} strokeWidth="1.5" strokeDasharray="4 3" opacity="0.7"/>}
                          {isHov && <circle cx={pos.x} cy={pos.y} r={r+5}
                            fill="none" stroke={stroke} strokeWidth="1" opacity="0.35"/>}
                          <circle cx={pos.x} cy={pos.y} r={r}
                            fill={isBn ? "rgba(127,29,29,0.4)" : "#13161b"}
                            stroke={stroke} strokeWidth={isBn ? 2.5 : 1.5}/>
                          <text x={pos.x} y={pos.y-10} textAnchor="middle"
                            fontSize="13" fontWeight="700" fill={T.text} style={{pointerEvents:"none"}}>{wc}</text>
                          <text x={pos.x} y={pos.y+4} textAnchor="middle"
                            fontSize="9" fill={T.text3} style={{pointerEvents:"none"}}>
                            {pos.label.length > 14 ? pos.label.substring(0,13)+"…" : pos.label}
                          </text>
                          <text x={pos.x} y={pos.y+17} textAnchor="middle"
                            fontSize="10" fontWeight="700" fill={stroke}
                            fontFamily="monospace" style={{pointerEvents:"none"}}>{uPct}%</text>
                          <rect x={pos.x-32} y={pos.y+r+6} width="64" height="16"
                            rx="4" fill="#0d0f12" stroke={T.border} strokeWidth="0.5"/>
                          <text x={pos.x} y={pos.y+r+17} textAnchor="middle"
                            fontSize="10" fontWeight="600" fill={T.text3}
                            fontFamily="monospace" style={{pointerEvents:"none"}}>{volume} szt.</text>
                        </g>
                      );
                    })}
                    </g>
                  </svg>
                </div>
              </div>
            </div>
          );
        }


        // ─── GŁÓWNY KOMPONENT APKI ───────────────────────────────────────────────────
        // ─── ZAKŁADKA: GRAFIK ZASOBÓW ────────────────────────────────────────────────
        // sched (wcSchedule) mieszka w App — GrafikTab tylko go wyświetla i edytuje
        // Format sched: { "G-01": [pon,wt,sr,czw,pt,sob,nd] } — 7 elementów, idx 0=pon
        function GrafikTab({ routing, zp, wcSchedule, onScheduleChange, subZP, slavePanX, slaveScaleIdx, slaveHourW, planStart }) {
          const { useRef } = React;
          const WCS = useMemo(() => [...new Set(routing.map(r => r.workcenter))].sort(), [routing]);
          const DAYS_LABEL = ['Pon','Wt','Śr','Czw','Pt','Sob','Nd'];
          const DAYS_FULL  = ['Poniedziałek','Wtorek','Środa','Czwartek','Piątek','Sobota','Niedziela'];

          // Skale (identyczne jak Gantt)
          const SCALES = [
            { key:'4h',  dayW:160 },
            { key:'8h',  dayW:112 },
            { key:'1d',  dayW:64  },
            { key:'3d',  dayW:32  },
            { key:'1w',  dayW:18  },
            { key:'2w',  dayW:9   },
          ];
          const [_scaleIdx, _setScaleIdx] = useState(2);
          const [_panX,     _setPanX]     = useState(0);
          const [isPan,    setIsPan]    = useState(false);
          const containerRef = useRef(null);
          const panRef       = useRef(null);

          // Slave mode: używaj wartości z zewnątrz
          const scaleIdx = slaveScaleIdx !== undefined ? slaveScaleIdx : _scaleIdx;
          const panX     = slavePanX     !== undefined ? slavePanX     : _panX;
          const setScaleIdx = slaveScaleIdx !== undefined ? () => {} : _setScaleIdx;
          const setPanX     = slavePanX     !== undefined ? () => {} : _setPanX;

          // W slave mode: DAY_W = HOUR_W * 24 (zsynchronizowany z Gantt)
          const DAY_W = slaveHourW !== undefined ? slaveHourW * 24 : SCALES[scaleIdx].dayW;
          const CYCLE = [0,4,8,12,16,20,24];

          // Model godzin: { wc: { "2026-05-22": 16, ... } }
          // onScheduleChange teraz przyjmuje ten format
          // Backwards compat: stary format [pon..nd] → konwertujemy

          // Zakres dat z subZP lub ZP (w slave mode zaczyna od axisStart Ganttu)
          const dateRange = useMemo(() => {
            let minDt = null, maxDt = null;
            // minDt = planStart — zawsze zacznij od tej samej daty co Gantt
            const ps = planStart || localDateStr(new Date());
            minDt = new Date(ps + 'T00:00:00');
            if (subZP && subZP.length) {
              subZP.forEach(s => {
                (s.segments||[]).forEach(seg => {
                  if (seg.segEnd) { const d = new Date(seg.segEnd); if (!maxDt||d>maxDt) maxDt=d; }
                });
                if (s.due_date) { const d = new Date(s.due_date+'T23:59:59'); if (!maxDt||d>maxDt) maxDt=d; }
              });
            } else if (zp.length) {
              zp.forEach(z => {
                const d = new Date(z.due_date);
                if (!minDt) minDt=d;
                if (!maxDt||d>maxDt) maxDt=d;
              });
            }
            if (!minDt||!maxDt) return [];
            minDt = new Date(minDt); minDt.setHours(0,0,0,0);
            maxDt = new Date(maxDt); maxDt.setHours(23,59,59,0);
            const dates = [];
            const cur = new Date(minDt);
            while (cur <= maxDt) { dates.push(localDateStr(cur)); cur.setDate(cur.getDate()+1); }
            return dates;
          }, [subZP ? subZP.length : 0, zp.length, planStart, subZP && subZP[0] ? (subZP[0].segments && subZP[0].segments[0] ? subZP[0].segments[0].segStart : null) : null]);

          // Domyślna dostępność dla daty
          function defaultAvail(dateStr) {
            const jsDay = new Date(dateStr+'T12:00:00').getDay();
            return (jsDay===0||jsDay===6) ? 0 : 16;
          }

          // Pobierz godziny dla wc+date z nowego lub starego formatu
          function getH(wc, dateStr) {
            const s = wcSchedule[wc];
            if (!s) return defaultAvail(dateStr);
            // Nowy format: obiekt z datami
            if (typeof s === 'object' && !Array.isArray(s)) {
              return s[dateStr] !== undefined ? s[dateStr] : defaultAvail(dateStr);
            }
            // Stary format: tablica [pon..nd]
            if (Array.isArray(s)) {
              const jsDay = new Date(dateStr+'T12:00:00').getDay();
              const idx = jsDay===0?6:jsDay-1;
              return s[idx] ?? defaultAvail(dateStr);
            }
            return defaultAvail(dateStr);
          }

          function setH(wc, dateStr, h) {
            const prev = wcSchedule[wc];
            // Konwertuj stary format na nowy jeśli potrzeba
            let newWC = {};
            if (prev && !Array.isArray(prev) && typeof prev === 'object') {
              newWC = { ...prev };
            }
            newWC[dateStr] = h;
            onScheduleChange({ ...wcSchedule, [wc]: newWC });
          }

          function cycleH(wc, dateStr) {
            const cur = getH(wc, dateStr);
            const idx = CYCLE.indexOf(cur);
            const next = CYCLE[(idx+1)%CYCLE.length];
            setH(wc, dateStr, next);
          }

          // Rzeczywiste godziny pracy na gnieździe w danym dniu — z segmentów back-schedule
          function needForDate(wc, dateStr) {
            if (!subZP || !subZP.length) {
              // Fallback: szacunek z ZP.due_date gdy brak back-schedule
              return zp.filter(z => z.due_date===dateStr).reduce((sum,z) => {
                const op = routing.find(r => r.product===z.product && r.workcenter===wc);
                return sum + (op ? z.volume*op.ct_min/60 : 0);
              }, 0);
            }
            // Sumuj godziny segmentów które przypadają na ten dzień i gniazdo
            let total = 0;
            subZP.forEach(s => {
              if (s.workcenter !== wc) return;
              (s.segments || []).forEach(seg => {
                if (!seg.segStart) return;
                const segDate = localDateStr(new Date(seg.segStart));
                if (segDate === dateStr) total += seg.durH;
              });
            });
            return total;
          }

          // Layout
          const LABEL_W = 110;
          const TOP_H   = 42;   // nagłówek dat
          const ROW_H   = 50;   // panel: h/dzień per gniazdo (większy bo utilization)
          const topH    = TOP_H + WCS.length * ROW_H;  // całkowita wysokość panelu
          const GAP     = 0;   // brak separatora (jeden panel)
          const LANE_H  = ROW_H;  // alias dla kompatybilności
          const contentW = dateRange.length * DAY_W;

          // Wheel handler
          React.useEffect(() => {
            const el = containerRef.current; if (!el) return;
            function onWheel(e) {
              e.preventDefault();
              if (e.ctrlKey||e.metaKey) {
                if (e.deltaY<0) setScaleIdx(v=>Math.max(0,v-1));
                else            setScaleIdx(v=>Math.min(SCALES.length-1,v+1));
              } else {
                setPanX(v => Math.min(0, Math.max(-(contentW-200), v-e.deltaY*1.5)));
              }
            }
            el.addEventListener('wheel', onWheel, {passive:false});
            return () => el.removeEventListener('wheel', onWheel);
          }, [contentW]);

          function onBgMouseDown(e) {
            if (e.target.getAttribute('data-bg')==='1') {
              panRef.current = {startX:e.clientX, startPanX:panX};
              setIsPan(true);
            }
          }
          function onMouseMove(e) {
            if (!panRef.current) return;
            const dx = e.clientX - panRef.current.startX;
            setPanX(Math.min(0, Math.max(-(contentW-200), panRef.current.startPanX+dx)));
          }
          function onMouseUp() { panRef.current=null; setIsPan(false); }

          if (!WCS.length) return <EmptyState icon="📅" title="Brak danych" sub="Wgraj routing.csv" />;
          if (!dateRange.length) return <EmptyState icon="📅" title="Brak zakresu dat" sub="Przelicz Gantt aby ustalić zakres" />;

          const dueDates  = new Set(zp.map(z=>z.due_date));

          // Kolor dostępności
          function availColor(h) {
            if (h===0)  return {bg:'rgba(0,0,0,0)',   text:T.text3};
            if (h<=8)   return {bg:'rgba(52,211,153,0.15)',  text:T.ok};
            if (h<=16)  return {bg:'rgba(77,148,255,0.15)',  text:T.accent};
            return             {bg:'rgba(168,85,247,0.15)',  text:'#c084fc'};
          }
          // Kolor zapotrzebowania
          function needColor(need, avail) {
            if (need===0) return {bg:'rgba(255,255,255,0.02)', text:T.text3};
            const r = avail>0 ? need/avail : 999;
            if (r>1.3) return {bg:T.critBg, text:T.crit};
            if (r>1.0) return {bg:T.bnBg,   text:T.bn};
            if (r>0.85)return {bg:T.warnBg, text:T.warn};
            return            {bg:T.okBg,   text:T.ok};
          }

          return (
            <div>
              {/* Controls — ukryte w slave mode */}
              {slavePanX === undefined && <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,flexWrap:'wrap'}}>
                <span style={{fontSize:13,color:T.text2}}>
                  <strong style={{color:T.text}}>
                    {dateRange[0]?.slice(5)} – {dateRange[dateRange.length-1]?.slice(5)}
                  </strong>
                  &nbsp;·&nbsp; {dateRange.length} dni &nbsp;·&nbsp; {WCS.length} gniazd
                </span>
                <div style={{display:'flex',gap:2,background:T.surface2,borderRadius:8,padding:2,marginLeft:8}}>
                  {SCALES.map((sc,i) => (
                    <button key={sc.key} onClick={()=>setScaleIdx(i)}
                      style={{padding:'4px 10px',fontSize:11,fontWeight:600,borderRadius:6,border:'none',
                        background:i===scaleIdx?T.accent:'transparent',
                        color:i===scaleIdx?'#fff':T.text3,cursor:'pointer'}}>
                      {sc.key}
                    </button>
                  ))}
                </div>
                <div style={{display:'flex',gap:6,alignItems:'center',marginLeft:'auto'}}>
                  <span style={{fontSize:10,color:T.text3}}>Ctrl+scroll=zoom · scroll=pan · klik=zmień h</span>
                  <button onClick={()=>{setPanX(0);setScaleIdx(2);}}
                    style={{...s.btn(false),fontSize:11,padding:'4px 10px'}}>⊡ Reset</button>
                </div>
              </div>}

              {/* Legenda */}
              <div style={{display:'flex',gap:12,fontSize:11,color:T.text3,marginBottom:8,flexWrap:'wrap',alignItems:'center'}}>
                <span style={{color:T.text3}}>Kliknij komórkę aby zmienić godziny (cykl 0→4→8→…→24h)</span>
                <span style={{marginLeft:8,display:'flex',gap:8,alignItems:'center'}}>
                  <span style={{color:T.ok,fontWeight:500}}>■ OK ≤85%</span>
                  <span style={{color:T.warn,fontWeight:500}}>■ Uwaga 85-100%</span>
                  <span style={{color:T.crit,fontWeight:500}}>■ Wąskie gardło &gt;100%</span>
                  <span style={{color:T.text3}}>■ Brak pracy</span>
                </span>
              </div>

              <div style={{...s.card,padding:0,overflow:'hidden'}}>
                <div ref={containerRef}
                  style={{background:T.ganttBg,borderRadius:12,overflow:'hidden',
                    height:`calc(100vh - 280px)`,minHeight:320,
                    cursor:isPan?'grabbing':'default',userSelect:'none',position:'relative'}}
                  onMouseDown={onBgMouseDown}
                  onMouseMove={onMouseMove}
                  onMouseUp={onMouseUp}
                  onMouseLeave={onMouseUp}
                >
                  <svg width="100%" height="100%" style={{display:'block'}}>
                    <defs>
                      <clipPath id="gfClip">
                        <rect x={LABEL_W} y="0" width="10000" height="10000"/>
                      </clipPath>
                    </defs>

                    {/* Tło */}
                    <rect x="0" y="0" width="100%" height="100%" fill={T.ganttBg} data-bg="1"/>

                    {/* separator usunięty — jeden panel */}

                    {/* ── SCROLLOWANA ZAWARTOŚĆ ── */}
                    <g clipPath="url(#gfClip)">
                      <g transform={`translate(${panX},0)`}>

                        {/* Tła pasków */}
                        {WCS.map((_,wi) => (
                          <rect key={`tbg${wi}`} x={LABEL_W} y={TOP_H+wi*ROW_H} width={contentW+40} height={ROW_H}
                            fill={wi%2===0?T.surface:T.surface2}/>
                        ))}

                        {/* Nagłówki dat (JEDEN — wspólny dla obu paneli) */}
                        {dateRange.map((d,di) => {
                          const x = LABEL_W + di*DAY_W;
                          const dt = new Date(d+'T12:00:00');
                          const jsDay = dt.getDay();
                          const isWe = jsDay===0||jsDay===6;
                          const isDue = dueDates.has(d);
                          return (
                            <g key={`hdr${d}`}>
                              {/* Weekend overlay — oba panele */}
                              {isWe && <rect x={x} y={TOP_H} width={DAY_W}
                                height={WCS.length*ROW_H}
                                fill="rgba(0,0,0,0.18)"/>}
                              <line x1={x} y1={0} x2={x}
                                y2={topH}
                                stroke={T.border} strokeWidth="0.5"/>
                              {/* Data */}
                              <text x={x+DAY_W/2} y={TOP_H-18} textAnchor="middle"
                                fontSize="10" fontWeight={isDue?700:400}
                                fill={isDue?T.bn:isWe?T.text3:T.text2}>
                                {String(dt.getDate()).padStart(2,'0')}.{String(dt.getMonth()+1).padStart(2,'0')}
                              </text>
                              {/* Dzień tygodnia */}
                              <text x={x+DAY_W/2} y={TOP_H-6} textAnchor="middle"
                                fontSize="9" fill={isWe?T.text3:T.text3}>
                                {DAY_NAMES[jsDay]}
                              </text>
                              {/* Due marker */}
                              {isDue && <rect x={x} y={0} width={DAY_W} height={4} rx="1"
                                fill={T.bn} opacity="0.7"/>}
                            </g>
                          );
                        })}

                        {/* ── PANEL: dostępne h + utilization — klikalne ── */}
                        {WCS.map((wc,wi) => (
                          <g key={`top${wc}`}>
                            {dateRange.map((d,di) => {
                              const x     = LABEL_W + di*DAY_W;
                              const h     = getH(wc, d);
                              const need  = needForDate(wc, d);
                              const ratio = h > 0 ? need / h : (need > 0 ? 999 : 0);
                              const pad   = 3;
                              // Kolor wg utilization (nie wg dostępnych h)
                              let bg, textCol, borderCol;
                              if (h === 0 && need === 0) {
                                bg='rgba(0,0,0,0)'; textCol=T.text3; borderCol='transparent';
                              } else if (need === 0) {
                                bg='rgba(255,255,255,0.04)'; textCol=T.text3; borderCol='transparent';
                              } else if (ratio > 1.0) {
                                bg=T.critBg; textCol=T.crit; borderCol=T.crit;
                              } else if (ratio > 0.85) {
                                bg=T.warnBg; textCol=T.warn; borderCol=T.warn;
                              } else if (ratio > 0) {
                                bg=T.okBg; textCol=T.ok; borderCol=T.ok;
                              } else {
                                bg='rgba(255,255,255,0.04)'; textCol=T.text3; borderCol='transparent';
                              }
                              return (
                                <g key={d} style={{cursor:'pointer'}} onClick={() => cycleH(wc, d)}>
                                  <rect x={x+pad} y={TOP_H+wi*ROW_H+pad}
                                    width={DAY_W-pad*2} height={ROW_H-pad*2}
                                    rx="4" fill={bg}
                                    stroke={borderCol} strokeWidth={ratio>0.85?1.5:0}/>
                                  {/* Godziny */}
                                  <text x={x+DAY_W/2} y={TOP_H+wi*ROW_H+ROW_H/2-4}
                                    textAnchor="middle" fontSize={DAY_W>40?11:9}
                                    fontWeight="600" fill={textCol} fontFamily="monospace"
                                    style={{pointerEvents:'none'}}>
                                    {h>0 ? h+'h' : '—'}
                                  </text>
                                  {/* Utilization % — tylko gdy jest praca */}
                                  {need > 0 && DAY_W > 30 && (
                                    <text x={x+DAY_W/2} y={TOP_H+wi*ROW_H+ROW_H/2+10}
                                      textAnchor="middle" fontSize="9"
                                      fill={textCol} fontFamily="monospace" opacity="0.8"
                                      style={{pointerEvents:'none'}}>
                                      {Math.round(ratio*100)}%
                                    </text>
                                  )}
                                </g>
                              );
                            })}
                          </g>
                        ))}

                        {/* dolny panel usunięty — utilization w górnym */}

                        {/* Linie poziome */}
                        {WCS.map((_,wi) => (
                          <line key={`ln${wi}`} x1={LABEL_W} y1={TOP_H+(wi+1)*ROW_H}
                            x2={LABEL_W+contentW+40} y2={TOP_H+(wi+1)*ROW_H}
                            stroke={T.border} strokeWidth="0.5"/>
                        ))}

                      </g>
                    </g>

                    {/* ── STAŁA LEWA KOLUMNA ── */}
                    {/* Tło */}
                    <rect x="0" y="0" width={LABEL_W} height="10000" fill={T.ganttBg}/>
                    {/* Nagłówek górny panel */}
                    <rect x="0" y="0" width={LABEL_W} height={TOP_H} fill={T.surface2}/>
                    <text x="12" y={TOP_H-12} fontSize="9" fontWeight="600"
                      fill={T.text3} textTransform="uppercase">DOSTĘPNE H</text>
                    {/* Górny panel labels */}
                    {WCS.map((wc,wi) => {
                      const totalAvail = dateRange.reduce((s,d)=>s+getH(wc,d),0);
                      return (
                        <g key={`ltop${wc}`}>
                          <rect x="0" y={TOP_H+wi*ROW_H} width={LABEL_W} height={ROW_H}
                            fill={T.surface2}/>
                          <text x="12" y={TOP_H+wi*ROW_H+ROW_H/2-4} fontSize="12"
                            fontWeight="700" fill={T.text}>{wc}</text>
                          <text x="12" y={TOP_H+wi*ROW_H+ROW_H/2+10} fontSize="10"
                            fill={T.text3}>{totalAvail}h</text>
                        </g>
                      );
                    })}
                    {/* Lewa kolumna */}
                    {WCS.map((wc,wi) => {
                      const totalNeed  = dateRange.reduce((s,d)=>s+needForDate(wc,d),0);
                      const totalAvail = dateRange.reduce((s,d)=>s+getH(wc,d),0);
                      const ratio = totalAvail>0 ? totalNeed/totalAvail : 0;
                      const col = ratio>1?T.crit:ratio>0.85?T.warn:totalNeed>0?T.ok:T.text3;
                      return (
                        <g key={`lbl${wc}`}>
                          <rect x="0" y={TOP_H+wi*ROW_H} width={LABEL_W} height={ROW_H}
                            fill={T.surface2}/>
                          <text x="12" y={TOP_H+wi*ROW_H+ROW_H/2-5} fontSize="12"
                            fontWeight="700" fill={T.text}>{wc}</text>
                          <text x="12" y={TOP_H+wi*ROW_H+ROW_H/2+10} fontSize="10"
                            fill={col}>{Math.round(ratio*100)}%</text>
                        </g>
                      );
                    })}
                    {/* Separator pionowy */}
                    <line x1={LABEL_W} y1="0" x2={LABEL_W} y2="10000"
                      stroke={T.border2} strokeWidth="1.5"/>
                  </svg>

                  {/* Scrollbar */}
                  {contentW > 200 && (
                    <div style={{position:'absolute',bottom:4,left:LABEL_W,right:8,height:5,
                      background:'rgba(255,255,255,0.05)',borderRadius:3}}>
                      <div style={{position:'absolute',top:0,height:'100%',borderRadius:3,
                        background:'rgba(255,255,255,0.2)',
                        width:`${Math.min(100,((containerRef.current?.offsetWidth||900)-LABEL_W)/(contentW||1)*100)}%`,
                        left:`${contentW>0?(-panX/contentW)*100:0}%`,
                        transition:'left 0.05s'}}/>
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        }



        // ─── ZAKŁADKA: PLAN (Gantt + Grafik zasobów) ──────────────────────────────

                      <thead><tr>
                        {['ZS / Pozycja / Klient','ZP','Produkt','Due date','Koniec','Opóźnienie','Bottleneck','Bufor','Status'].map(h => (
                          <th key={h} style={{ fontSize:10, fontWeight:600, letterSpacing:'.06em',
                            textTransform:'uppercase', color:T.text3, padding:'0 8px 8px',

                      </tr></thead>
                      <tbody>
                        {(() => {
                          // Grupuj per ZS
                          const byZS = {};
                          zpStatus.forEach(st => {
                            const key = st.zs_id || 'bez-ZS';
                            if (!byZS[key]) byZS[key] = [];
                            byZS[key].push(st);
                          });
                          // Sortuj ZS wg najgorszego statusu w grupie
                          const ord = {black:0,red:1,yellow:2,green:3};
                          const rows = [];
                          Object.entries(byZS)
                            .sort(([,a],[,b]) => {
                              const wa = Math.min(...a.map(s=>ord[s.toc?.zone]??4));
                              const wb = Math.min(...b.map(s=>ord[b[0].toc?.zone]??4));
                              return wa-wb;
                            })
                            .forEach(([zsKey, stList]) => {
                              // Nagłówek ZS
                              const first = stList[0];
                              const maxOrd = Math.min(...stList.map(s=>ord[s.toc?.zone]??4));
                              const zsColor = maxOrd===0?T.bn:maxOrd===1?T.bn:maxOrd===2?T.warn:T.ok;
                              rows.push(
                                <tr key={`zs-${zsKey}`} style={{ background:T.surface2 }}>
                                  <td colSpan={9} style={{ padding:'6px 8px', borderBottom:`1px solid ${T.border2}`,
                                    borderTop:`2px solid ${T.border2}` }}>
                                    <span style={{ fontWeight:700, color:zsColor, fontSize:12 }}>
                                      {first.zs_id || '—'}
                                    </span>
                                    {first.klient && <span style={{ fontSize:11, color:T.text3, marginLeft:8 }}>
                                      {first.klient}
                                    </span>}
                                    <span style={{ fontSize:10, color:T.text3, marginLeft:8 }}>
                                      ({stList.length} ZP)
                                    </span>
                                  </td>
                                </tr>
                              );
                              // Wiersze ZP posortowane wg opóźnienia
                              [...stList].sort((a,b) => (ord[a.toc?.zone]??4)-(ord[b.toc?.zone]??4))
                                .forEach((st,i) => {
                                  const col = globalLookups.zpColorMap[st.zp_id]||T.text3;
                                  const tc  = tocColor(st.toc?.zone||'green');
                                  rows.push(
                                    <tr key={`zp-${st.zp_id}`} style={{
                                      background:['black','red'].includes(st.toc?.zone)?'rgba(248,113,113,0.03)':'transparent'
                                    }}>
                                      <td style={{ padding:'6px 8px 6px 20px', borderBottom:`1px solid ${T.border}`, color:T.text3, fontSize:10 }}>
                                        poz.{st.pozycja}
                                      </td>
                                      <td style={{ padding:'6px 8px', borderBottom:`1px solid ${T.border}` }}>
                                        <span style={{ display:'flex', alignItems:'center', gap:4 }}>
                                          <Dot color={col} size={7}/>
                                          <code style={{ fontSize:11, color:T.accent, background:T.accentBg,
                                            padding:'1px 5px', borderRadius:4 }}>{st.zp_id}</code>
                                        </span>
                                      </td>
                                      <td style={{ padding:'6px 8px', borderBottom:`1px solid ${T.border}`, color:T.text2, fontSize:11 }}>{st.product}</td>
                                      <td style={{ padding:'6px 8px', borderBottom:`1px solid ${T.border}`, fontFamily:'monospace', fontSize:11, color:T.text2 }}>{st.due_date}</td>
                                      <td style={{ padding:'6px 8px', borderBottom:`1px solid ${T.border}`, fontFamily:'monospace', fontSize:11,
                                        color:st.delayH>0?T.bn:T.ok, fontWeight:st.delayH>0?600:400 }}>
                                        {st.realEnd?fmtDt(st.realEnd):'—'}
                                      </td>
                                      <td style={{ padding:'6px 8px', borderBottom:`1px solid ${T.border}`, fontFamily:'monospace', fontSize:11,
                                        color:st.delayH>0?T.bn:T.ok, fontWeight:600 }}>
                                        {st.delayDays>0?`+${st.delayDays}d`:'✓ OK'}
                                      </td>
                                      <td style={{ padding:'6px 8px', borderBottom:`1px solid ${T.border}` }}>
                                        {st.bottleneck && <span style={{ display:'inline-flex', alignItems:'center',
                                          gap:4, padding:'2px 7px', borderRadius:4, fontSize:11, fontWeight:600,
                                          background:T.bnBg, color:T.bn }}>
                                          🔴 {st.bottleneck}
                                        </span>}
                                      </td>
                                      <td style={{ padding:'6px 8px', borderBottom:`1px solid ${T.border}` }}>
                                        <div style={{ height:5, background:T.surface3, borderRadius:3, width:70, marginBottom:2 }}>
                                          <div style={{ height:'100%', borderRadius:3, background:tc.border,
                                            width:`${Math.min(100,Math.max(0,Math.round((st.toc?.consumed||0)*100)))}%` }}/>
                                        </div>
                                        <span style={{ fontSize:10, color:T.text3 }}>{Math.round((st.toc?.consumed||0)*100)}%</span>
                                      </td>
                                      <td style={{ padding:'6px 8px', borderBottom:`1px solid ${T.border}` }}>
                                        <span style={{ display:'inline-flex', padding:'2px 8px', borderRadius:5,
                                          fontSize:10, fontWeight:600, background:tc.bg, color:tc.text }}>
                                          {st.toc?.label||'—'}
                                        </span>
                                      </td>
                                    </tr>
                                  );
                                });
                            });
                          return rows;
                        })()}
                      </tbody>
                    </table>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const TABS = [
          { id: "import",      label: "Import CSV" },
          { id: "plan",        label: "📋 Plan" },
          { id: "bottleneck",  label: "Bottleneck" },
          { id: "routing",     label: "Routing" },
          { id: "heatmap",     label: "Heatmapa" },
          { id: "swimlane",    label: "Swimlane" },
          { id: "sankey",      label: "Przepływ (Sankey)" },
        ];

        // Domyślny grafik: pon-pt 16h, sob-nd 0h
        function initDefaultSchedule(wcs) {
          const s = {};
          wcs.forEach(wc => { s[wc] = [16,16,16,16,16,0,0]; }); // [pon,wt,sr,czw,pt,sob,nd]
          return s;
        }

        function App() {
          const [tab, setTab] = useState("import");
          const [routing, setRouting] = useState([]);
          const [zp, setZP] = useState([]);
          const [wcSchedule, setWcSchedule] = useState({});
          const [subZP,      setSubZP]      = useState([]);
          const [fwdZP,      setFwdZP]      = useState([]);
          const [zpStatus,   setZpStatus]   = useState([]);
          const [ganttDirty, setGanttDirty] = useState(true);
          const [planStart,  setPlanStart]  = useState('2026-05-22');

          function updateSchedule(s) {
            setWcSchedule(s);
            setGanttDirty(true);
          }

          // Init wcSchedule gdy routing się załaduje — PO wszystkich useState
          React.useEffect(() => {
            if (routing.length > 0) {
              const wcs = [...new Set(routing.map(r => r.workcenter))].sort();
              setWcSchedule(prev => {
                const missing = wcs.filter(w => !prev[w]);
                if (missing.length === 0) return prev;
                const next = { ...prev };
                missing.forEach(w => { next[w] = [16,16,16,16,16,0,0]; });
                return next;
              });
              setGanttDirty(true);
            }
          }, [routing.length]);


          const globalLookups = useMemo(() => {
            const routingByProduct = {};
            routing.forEach(r => {
              if (!routingByProduct[r.product]) routingByProduct[r.product] = [];
              routingByProduct[r.product].push(r);
            });
            Object.keys(routingByProduct).forEach(p => {
              routingByProduct[p].sort((a, b) => a.sequence - b.sequence);
            });

            const zpColorMap = {};
            zp.forEach((z, index) => {
              zpColorMap[z.zp_id] = PALETTE[index % PALETTE.length];
            });
            // Również mapuj subZP parent_zp → kolor
            // (obsługiwane przez lookup parent_zp w blokach Ganttu)

            const productIndexMap = {};
            const uniqueProducts = [...new Set(routing.map(r => r.product))];
            uniqueProducts.forEach((p, index) => {
              productIndexMap[p] = index;
            });

            return { routingByProduct, zpColorMap, productIndexMap };
          }, [routing, zp]);

          // Auto-przelicz gdy ZP, routing lub grafik się zmienią
          React.useEffect(() => {
            const rl = globalLookups.routingByProduct;
            if (zp.length > 0 && Object.keys(rl).length > 0 && Object.keys(wcSchedule).length > 0) {
              recalcGantt();
            }
          }, [zp.length, routing.length, JSON.stringify(wcSchedule), planStart]);

          function recalcGantt() {
            const rl     = globalLookups.routingByProduct;
            const sorted = [...zp].sort((a,b) => a.priority-b.priority || a.due_date.localeCompare(b.due_date));

            // 1. Back-schedule (idealny plan)
            const backResult = backSchedule(sorted, rl, wcSchedule);
            setSubZP(backResult);

            // 2. Forward-schedule od planStart z kolejką
            const planStartDt = new Date(planStart + 'T00:00:00');
            const fwdResult   = forwardSchedule(sorted, rl, wcSchedule, planStartDt);
            setFwdZP(fwdResult);

            // 3. TOC buffer per ZP
            const statuses = sorted.map(zpItem => {
              // backStart = najwcześniejszy start z back-schedule dla tego ZP
              const backOps = backResult.filter(s => s.parent_zp === zpItem.zp_id || s.zp_id === zpItem.zp_id);
              const backStart = backOps.length
                ? new Date(Math.min(...backOps.map(s => s.start_dt ? new Date(s.start_dt).getTime() : Infinity)))
                : planStartDt;
              const dueDate   = new Date(zpItem.due_date + 'T23:59:59');
              const fwdOps    = fwdResult.filter(s => s.parent_zp === zpItem.zp_id || s.zp_id === zpItem.zp_id);
              // Ostatnia operacja = max sequence (nie ostatni w tablicy po sortowaniu)
              const lastFwdOp = fwdOps.length
                ? fwdOps.reduce((best, op) => op.sequence > best.sequence ? op : best, fwdOps[0])
                : null;
              const realEnd   = lastFwdOp ? lastFwdOp.end_dt : planStartDt;
              const delayH    = Math.max(0, (new Date(realEnd) - dueDate) / 3600000);
              const delayDays = +(delayH / 16).toFixed(1);
              const toc       = tocBuffer(backStart, planStartDt, dueDate, new Date(realEnd));
              // Bottleneck = gniazdo z najdłuższą operacją forward-scheduled dla tego ZP
            const fwdForZP = fwdResult.filter(s => s.parent_zp === zpItem.zp_id || s.zp_id === zpItem.zp_id);
            const bottleneck = fwdForZP.length
              ? fwdForZP.reduce((b, op) => op.durH > b.durH ? op : b, fwdForZP[0])
              : null;
            return {
                zp_id:      zpItem.zp_id,
                zs_id:      zpItem.zs_id || '',
                pozycja:    zpItem.pozycja || '',
                product:    zpItem.product,
                due_date:   zpItem.due_date,
                priority:   zpItem.priority,
                klient:     zpItem.klient || '',
                bottleneck: bottleneck ? bottleneck.workcenter : null,
                backStart, realEnd, delayH, delayDays, toc,
              };
            });
            setZpStatus(statuses);
            setGanttDirty(false);
          }

          // Auto-przelicz gdy ZP lub grafik zmienią się
          const handleLoad = useCallback((text, type) => {
            if (type === "demo") {
              const r  = parseRouting(DEMO_ROUTING);
              const zs = parseZS(DEMO_ZS);
              const z  = zsToZP(zs);
              setRouting(r);
              setZP(z);
              setGanttDirty(true);
              setTab("plan");
              return;
            }
            if (type === "routing") {
              const r = parseRouting(text);
              setRouting(r);
              if (r.length && zp.length) setTab("plan");
            } else if (type === "zs") {
              const zsList = parseZS(text);
              const zpFromZS = zsToZP(zsList);
              setZP(zpFromZS);
              if (routing.length && zpFromZS.length) setTab("plan");
            } else {
              // zp.csv — konwertuj ID do nowego formatu jeśli brakuje zs_id
              const z = parseZP(text).map((zpItem, i) => {
                if (!zpItem.zs_id) {
                  // Generuj pseudo-ZS ID z numeru ZP
                  const num = zpItem.zp_id.replace(/[^0-9]/g,'').padStart(3,'0') || String(i+1).padStart(3,'0');
                  return { ...zpItem, zs_id: `ZS-${num}`, pozycja: 1,
                    zp_id: `ZP-${num}/01/01` };
                }
                return zpItem;
              });
              setZP(z);
              if (routing.length && z.length) setTab("plan");
            }
          }, [routing.length, zp.length]);

          function exportLoad() {
            const dates = [...new Set(zp.map(z => z.due_date))].sort();
            const rows = [["gniazdo","due_date","load_h","cap_h","utilization_pct"]];
            dates.forEach(d => {
              const zpForDate = zp.filter(z => z.due_date === d);
              const loads = computeLoads(globalLookups.routingByProduct, zpForDate);
              Object.entries(loads).forEach(([wc, v]) => {
                rows.push([wc, d, v.load.toFixed(2), v.cap.toFixed(1), Math.round(v.util * 100)]);
              });
            });
            dlCSV(rows, "raport_obciazenia.csv");
          }

          const hasData = routing.length > 0 && zp.length > 0;

          return (
            <div style={{ minHeight:"100vh", background:T.bg, color:T.text, fontFamily:"'DM Sans',system-ui,sans-serif" }}>
              {/* NAVBAR */}
              <nav style={{ background: T.surface, borderBottom: `1px solid ${T.border}`, padding: "0 24px", display: "flex", alignItems: "center", height: 52, position: "sticky", top: 0, zIndex: 100 }}>
                <span style={{ fontSize: 14, fontWeight: 700, marginRight: 32, color: T.text }}>FlowOps</span>

                {TABS.map(t => (
                  <button key={t.id} onClick={() => setTab(t.id)} style={{
                    height: 52, padding: "0 16px", fontSize: 13, fontWeight: 500,
                    border: "none", background: "none", cursor: "pointer",
                    color: tab === t.id ? T.text : T.text3,
                    borderBottom: `2px solid ${tab === t.id ? T.accent : "transparent"}`,
                  }}>{t.label}</button>
                ))}

                {hasData && (
                  <button style={{ marginLeft:"auto", ...s.btn(false), fontSize:11 }} onClick={exportLoad}>
                    ↓ Eksportuj raport
                  </button>
                )}
              </nav>

              {/* KONTENER GŁÓWNY */}
              <main style={{ maxWidth: 1160, margin: "0 auto", padding: "28px 24px" }}>
                {tab === "import"     && <ImportTab routing={routing} zp={zp} onLoad={handleLoad} />}
                {tab === "plan"       && <PlanTab routing={routing} zp={zp} globalLookups={globalLookups} wcSchedule={wcSchedule} subZP={subZP} fwdZP={fwdZP} zpStatus={zpStatus} ganttDirty={ganttDirty} onRecalc={() => recalcGantt()} onScheduleChange={updateSchedule} planStart={planStart} onPlanStartChange={setPlanStart} />}
                {tab === "bottleneck" && <BottleneckTab routing={routing} zp={zp} globalLookups={globalLookups} wcSchedule={wcSchedule} subZP={subZP} />}
                {tab === "routing"    && <RoutingTab routing={routing} zp={zp} globalLookups={globalLookups} />}
                {tab === "heatmap"    && <HeatmapTab routing={routing} zp={zp} globalLookups={globalLookups} wcSchedule={wcSchedule} />}
                {tab === "swimlane"   && <SwimlaneTab routing={routing} zp={zp} globalLookups={globalLookups} wcSchedule={wcSchedule} />}
                {tab === "sankey"     && <SankeyTab routing={routing} zp={zp} globalLookups={globalLookups} wcSchedule={wcSchedule} />}
              </main>
            </div>
          );
        }

        const reactRoot = ReactDOM.createRoot(document.getElementById('root'));
        reactRoot.render(<App />);
    </script>
</body>
</html>
